                                {sortedDepartments.length > 0 && (
                                    <div className="flex md:flex-col overflow-x-auto md:overflow-visible gap-3 pb-4 md:pb-0">
                                        <div className="hidden md:flex items-center justify-between px-2 mb-1">
                                            <h2 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Välj Avdelning</h2>
                                        </div>
                                        {sortedDepartments.map(dep => {
                                            const isUnknown = dep === 'Okända fordon'; const isCustom = customDeps.hasOwnProperty(dep);
                                            let depVehicles = [];
                                            if (isUnknown) depVehicles = unknownVehicles;
                                            else if (isCustom) depVehicles = vehicles.filter(v => customDeps[dep].includes(v['Namn']));
                                            else depVehicles = vehicles.filter(v => v.Avdelning === dep);

                                            const activeDepVehicles = depVehicles.filter(v => !hiddenVehicles.includes(v['Namn']));
                                            const activeCount = activeDepVehicles.length; const isActive = activeTab === dep;
                                            
                                            let okCount = 0, warnCount = 0, errCount = 0, incompleteCount = 0;
                                            activeDepVehicles.forEach(v => {
                                                let cData, s;
                                                if (v.isUnknown) {
                                                    cData = v.checks.latest || v.postChecks.latest; s = analyzeCheckStatus(cData);
                                                } else {
                                                    cData = getChecksForDate(v['Namn']).latest; s = analyzeCheckStatus(cData);
                                                    if (!cData) { const pData = getOnlyPostChecksForDate(v['Namn']).latest; if (pData) s = "ERROR"; }
                                                }
                                                if (s === 'OK') okCount++; else if (s === 'WARNING') warnCount++; else if (s === 'ERROR') errCount++; else if (s === 'INCOMPLETE') incompleteCount++;
                                            });

                                            const isDepDragOver = dragOverDep === dep;
                                            const depDragClasses = isDepDragOver ? "border-blue-500 border-t-4" : "";
                                            let btnStyle = isActive ? 'bg-blue-600 border-blue-600 text-white shadow-md' : 'bg-white border-slate-200 hover:border-blue-300 hover:bg-blue-50';
                                            if (isUnknown) btnStyle = isActive ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-indigo-50 border-indigo-200 text-indigo-700 hover:border-indigo-400 hover:bg-indigo-100';
                                            else if (isCustom) btnStyle = isActive ? 'bg-sky-600 border-sky-600 text-white shadow-md' : 'bg-sky-50/50 border-sky-200 text-sky-800 hover:border-sky-400 hover:bg-sky-100';

                                            return (
                                                <button key={dep} draggable={!isUnknown} onDragStart={!isUnknown ? (e) => handleDepDragStart(e, dep) : undefined} onDragEnd={!isUnknown ? handleDepDragEnd : undefined} onDragOver={!isUnknown ? (e) => handleDepDragOver(e, dep) : undefined} onDrop={!isUnknown ? (e) => handleDepDrop(e, dep) : undefined} onClick={() => setActiveTab(dep)} className={`group relative flex flex-col px-4 py-3 text-left transition-all rounded-xl border ${isUnknown ? 'cursor-pointer' : 'cursor-grab active:cursor-grabbing'} ${depDragClasses} ${btnStyle}`}>
                                                    {isCustom && (
                                                        <div onClick={(e) => { e.stopPropagation(); setDepToDelete(dep); }} className={`absolute top-2 right-2 p-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity ${isActive ? 'bg-white/20 hover:bg-red-500 hover:text-white text-blue-100' : 'bg-red-50 text-red-500 hover:bg-red-100'}`} title="Ta bort egen avdelning"><Icon name="trash-2" className="w-3.5 h-3.5" /></div>
                                                    )}
                                                    <div className="flex justify-between items-center w-full mb-2">
                                                        <span className={`font-semibold text-sm truncate pr-8 flex items-center gap-1.5 ${isActive ? 'text-white' : ''}`}>
                                                            {isUnknown && <Icon name="help-circle" className="w-4 h-4 shrink-0" />} {isCustom && <Icon name="folder-heart" className={`w-4 h-4 shrink-0 ${isActive ? 'text-sky-200' : 'text-sky-500'}`} />}
                                                            <span className="truncate">{dep}</span>
                                                        </span>
                                                        <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold shrink-0 ${isActive ? 'bg-black/20 text-white' : (isUnknown ? 'bg-indigo-200 text-indigo-800' : (isCustom ? 'bg-sky-200 text-sky-800' : 'bg-slate-100 text-slate-500'))}`}>{activeCount} bilar</span>
                                                    </div>
                                                    <div className={`flex gap-3 text-[11px] font-bold ${isActive ? 'text-blue-100' : (isUnknown ? 'text-indigo-400' : (isCustom ? 'text-sky-600/60' : 'text-slate-400'))}`}>
                                                        <div className={`flex items-center gap-1 ${okCount > 0 ? (isActive ? 'text-green-300' : 'text-green-600') : ''}`}><Icon name="circle-check" className="w-3.5 h-3.5" /> {okCount}</div>
                                                        <div className={`flex items-center gap-1 ${warnCount > 0 ? (isActive ? 'text-yellow-300' : 'text-yellow-500') : ''}`}><Icon name="triangle-alert" className="w-3.5 h-3.5" /> {warnCount}</div>
                                                        <div className={`flex items-center gap-1 ${errCount > 0 ? (isActive ? 'text-red-300' : 'text-red-500') : ''}`}><Icon name="circle-x" className="w-3.5 h-3.5" /> {errCount}</div>
                                                        <div className={`flex items-center gap-1 ${incompleteCount > 0 ? (isActive ? 'text-orange-300' : 'text-orange-500') : ''}`}><Icon name="file-question" className="w-3.5 h-3.5" /> {incompleteCount}</div>
                                                    </div>
                                                </button>
                                            );
                                        })}
                                        <button onClick={() => setShowCreateDepModal(true)} className="flex items-center justify-center gap-2 mt-2 px-4 py-3 border-2 border-dashed border-slate-300 text-slate-500 hover:text-blue-600 hover:border-blue-400 hover:bg-blue-50 transition-all rounded-xl text-sm font-bold w-full"><Icon name="plus" className="w-4 h-4" /> Skapa egen avdelning</button>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="flex-1 space-y-8">
                            <div>
                                {sortedActiveVehicles.length > 0 ? (
                                    <>
                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
                                            <span className="text-xs font-bold text-slate-400 uppercase tracking-wider pl-1">Aktiva fordon</span>
                                            
                                            {/* Sorterings-meny */}
                                            {!isUnknownTab && (
                                                <div className="flex flex-wrap items-center gap-2 bg-white px-2 py-1.5 rounded-lg border border-slate-200 shadow-sm">
                                                    <Icon name="arrow-up-down" className="w-4 h-4 text-slate-400" />
                                                    <select
                                                        value={sortMethod}
                                                        onChange={(e) => setSortMethod(e.target.value)}
                                                        className="text-sm font-medium text-slate-600 bg-transparent focus:outline-none cursor-pointer"
                                                    >
                                                        <option value="custom">Egen sortering (Dra & Släpp)</option>
                                                        <option value="internref">A-Ö (Internreferens)</option>
                                                        <option value="regnr">A-Ö (Reg-nr)</option>
                                                    </select>
                                                </div>
                                            )}
                                        </div>

                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                            {sortedActiveVehicles.map((vehicle) => renderVehicleCard(vehicle, false))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="text-center p-8 border-2 border-dashed border-slate-200 rounded-xl"><p className="text-slate-500">Inga aktiva fordon att visa för denna avdelning.</p></div>
                                )}
                            </div>

                            {inactiveVehicles.length > 0 && (
                                <div>
                                    <div className="flex items-center gap-3 mb-4 mt-8"><div className="h-px bg-slate-300 flex-1"></div><h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2"><Icon name="eye-off" className="w-4 h-4" /> Dolda fordon ({inactiveVehicles.length})</h3><div className="h-px bg-slate-300 flex-1"></div></div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                        {inactiveVehicles.map((vehicle) => renderVehicleCard(vehicle, true))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* NY MODAL FÖR FELRAPPORTER (IFRAMES) */}
                    {reportModalData && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4 md:p-6">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-[95vw] lg:max-w-7xl h-[85vh] flex flex-col overflow-hidden animate-in zoom-in-95">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                                    <div>
                                        <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                            <Icon name="stethoscope" className="w-6 h-6 text-red-500" />
                                            Felrapporter
                                        </h2>
                                        <p className="text-sm text-slate-500">Hantera registrerade fel för valt ekipage.</p>
                                    </div>
                                    <button onClick={() => setReportModalData(null)} className="text-slate-400 hover:text-slate-600 p-2 rounded-full hover:bg-slate-200 transition-colors">
                                        <Icon name="x" className="w-6 h-6" />
                                    </button>
                                </div>
                                
                                <div className="flex-1 p-4 bg-slate-100/50 flex gap-4 overflow-hidden">
                                    {/* Kolumn för Bil */}
                                    <div className="flex-1 flex flex-col bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                        <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 flex items-center gap-2">
                                            <Icon name="truck" className="w-5 h-5 text-slate-600" />
                                            <span className="font-bold text-slate-800">
                                                Bil: {reportModalData.truck.Internreferens ? `${reportModalData.truck.Internreferens} (${reportModalData.truck['Namn']})` : reportModalData.truck['Namn']}
                                            </span>
                                        </div>
                                        <iframe 
                                            src={buildIframeUrl(reportModalData.truckId)} 
                                            className="w-full h-full flex-1 border-none bg-slate-50"
                                            title="Felrapporter Bil"
                                        />
                                    </div>

                                    {/* Kolumn för Släp (Visas bara om släp var inblandat i passet) */}
                                    {reportModalData.trailerReg && (
                                        <div className="flex-1 flex flex-col bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                            <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 flex items-center gap-2">
                                                <Icon name="trailer" className="w-5 h-5 text-slate-600" />
                                                <span className="font-bold text-slate-800">
                                                    Släp: {reportModalData.trailerObj && reportModalData.trailerObj.Internreferens ? `${reportModalData.trailerObj.Internreferens} (${reportModalData.trailerObj['Namn']})` : (reportModalData.trailerObj ? reportModalData.trailerObj['Namn'] : String(reportModalData.trailerReg).toUpperCase())}
                                                </span>
                                            </div>
                                            
                                            {reportModalData.trailerObj && reportModalData.trailerObj['Formulärsvar ID (read-only)'] ? (
                                                <iframe 
                                                    src={buildIframeUrl(reportModalData.trailerObj['Formulärsvar ID (read-only)'])} 
                                                    className="w-full h-full flex-1 border-none bg-slate-50"
                                                    title="Felrapporter Släp"
                                                />
                                            ) : (
                                                <div className="flex-1 flex flex-col items-center justify-center p-8 text-center bg-slate-50">
                                                    <Icon name="alert-circle" className="w-16 h-16 text-slate-300 mb-4" />
                                                    <h3 className="text-lg font-bold text-slate-600 mb-2">Okänt släp</h3>
                                                    <p className="text-slate-500">Släpet <b>{String(reportModalData.trailerReg).toUpperCase()}</b> finns inte i fordonsregistret. Felrapporter kan därför inte visas för denna enhet.</p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal för detaljer (Original) */}
                    {selectedVehicle && currentView === 'overview' && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[50] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <div className="flex items-center gap-4">
                                        <div className={`p-3 rounded-xl shrink-0 ${selectedVehicle.vehicle.isUnknown ? 'bg-indigo-100 text-indigo-700' : 'bg-blue-100 text-blue-700'}`}><Icon name={selectedVehicle.vehicle.isUnknown ? "help-circle" : "truck"} className="w-6 h-6" /></div>
                                        <div>
                                            {selectedVehicle.vehicle.Internreferens && <span className="text-2xl font-extrabold text-slate-800 tracking-tight block mb-1">{selectedVehicle.vehicle.Internreferens}</span>}
                                            <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mb-1.5">
                                                <h2 className={`${selectedVehicle.vehicle.Internreferens ? 'text-sm text-slate-500' : 'text-xl text-slate-800'} font-bold leading-none`}>{selectedVehicle.vehicle['Namn']}</h2>
                                                {modalDisplayTrailer && <span className="px-2 py-0.5 bg-indigo-50 text-indigo-700 font-semibold text-xs rounded border border-indigo-100 flex items-center gap-1.5 shadow-sm"><Icon name="trailer" className="w-3 h-3" /> {modalDisplayTrailer}</span>}
                                            </div>
                                            <p className="text-xs text-slate-500 font-medium">{selectedVehicle.vehicle['Avdelning']}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedVehicle(null)} className="text-slate-400 hover:text-slate-600 p-2 rounded-full hover:bg-slate-200 transition-colors"><Icon name="x" className="w-6 h-6" /></button>
                                </div>

                                <div className="p-6 overflow-y-auto bg-slate-100/50">
                                    {(!currentModalCheck && !currentModalPostCheck) ? (
                                        <div className="text-center py-12 bg-white rounded-xl border border-slate-200"><Icon name="file-question" className="w-16 h-16 mx-auto text-slate-300 mb-4" /><h3 className="text-lg font-medium text-slate-600">Ingen kontroll utförd</h3><p className="text-slate-500 text-sm mt-1">Det finns ingen registrerad kontroll för detta fordon under det valda datumet.</p></div>
                                    ) : (
                                        <div className="space-y-8">
                                            {/* DEL 1: FÖRE KÖRNING */}
                                            <div className={`bg-white p-6 rounded-2xl border shadow-sm ${!currentModalCheck && currentModalPostCheck ? 'border-red-300 bg-red-50/30' : 'border-slate-200'}`}>
                                                <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="truck" className={`w-5 h-5 ${!currentModalCheck && currentModalPostCheck ? 'text-red-500' : 'text-blue-600'}`} /> 1. Före körning</h3>
                                                {!currentModalCheck && currentModalPostCheck ? (
                                                    <div className="bg-red-50 border border-red-200 rounded-xl p-6 text-center"><Icon name="alert-triangle" className="w-10 h-10 mx-auto text-red-400 mb-3" /><p className="font-bold text-red-700">Saknar kontroll före körning!</p><p className="text-sm text-red-600/80 mt-1 max-w-md mx-auto">Detta pass avslutades med en Efter-kontroll, men systemet hittar ingen tillhörande Före-kontroll.</p></div>
                                                ) : (
                                                    <>
                                                        {selectedVehicle.checkData && selectedVehicle.checkData.all && selectedVehicle.checkData.all.length > 1 && (
                                                            <div className="bg-blue-50 border border-blue-200 text-blue-800 p-3 rounded-xl flex flex-col sm:flex-row sm:items-center justify-between gap-3 text-sm shadow-sm mb-6">
                                                                <div className="flex items-center gap-3"><Icon name="layers" className="w-5 h-5 shrink-0 text-blue-600" /><div><strong className="block">Flera kontroller hittades ({selectedVehicle.checkData.all.length} st)</strong><span className="text-blue-700/80 text-xs">Använd knapparna för att bläddra i tiden.</span></div></div>
                                                                <div className="flex items-center gap-1.5 bg-white/60 p-1.5 rounded-lg border border-blue-100 shrink-0">
                                                                    <button onClick={() => setCurrentCheckIndex(prev => Math.min(prev + 1, selectedVehicle.checkData.all.length - 1))} disabled={currentCheckIndex === selectedVehicle.checkData.all.length - 1} className="px-2 py-1.5 bg-white text-blue-700 hover:bg-blue-100 disabled:opacity-40 rounded shadow-sm border border-blue-200 flex items-center gap-1"><Icon name="chevron-left" className="w-4 h-4" /><span className="text-xs font-bold hidden sm:inline">Äldre</span></button>
                                                                    <span className="font-bold text-xs px-2 min-w-[50px] text-center">{selectedVehicle.checkData.all.length - currentCheckIndex} / {selectedVehicle.checkData.all.length}</span>
                                                                    <button onClick={() => setCurrentCheckIndex(prev => Math.max(prev - 1, 0))} disabled={currentCheckIndex === 0} className="px-2 py-1.5 bg-white text-blue-700 hover:bg-blue-100 disabled:opacity-40 rounded shadow-sm border border-blue-200 flex items-center gap-1"><span className="text-xs font-bold hidden sm:inline">Nyare</span><Icon name="chevron-right" className="w-4 h-4" /></button>
                                                                </div>
                                                            </div>
                                                        )}
                                                        <div className="flex flex-wrap gap-4 p-4 bg-slate-50 rounded-xl border border-slate-100 mb-6">
                                                            <div className="flex-1 min-w-[120px]"><span className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Förare</span><span className="font-medium text-slate-800">{currentModalCheck['Respondent (read-only)']}</span></div>
                                                            <div className="flex-1 min-w-[120px]"><span className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Tidpunkt (Start)</span><span className="font-medium text-slate-800">{currentModalCheck['Datum/tid']}</span></div>
                                                            <div className="flex-1 min-w-[160px]"><span className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Status (Före)</span>
                                                                {currentModalStatus === 'OK' && <span className="font-bold text-green-600 flex items-start gap-1"><Icon name="circle-check" className="w-4 h-4 mt-0.5 shrink-0"/> Godkänd</span>}
                                                                {currentModalStatus === 'WARNING' && <span className="font-bold text-yellow-600 flex items-start gap-1"><Icon name="triangle-alert" className="w-4 h-4 mt-0.5 shrink-0"/> Egen åtgärd</span>}
                                                                {currentModalStatus === 'ERROR' && <span className="font-bold text-red-600 flex items-start gap-1"><Icon name="circle-x" className="w-4 h-4 mt-0.5 shrink-0"/> Fel att rapportera</span>}
                                                                {currentModalStatus === 'INCOMPLETE' && <span className="font-bold text-orange-600 flex items-start gap-1"><Icon name="file-question" className="w-4 h-4 mt-0.5 shrink-0"/> Ofullständig</span>}
                                                            </div>
                                                        </div>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                            {Object.entries(currentModalCheck).map(([question, answer], i) => {
                                                                if (['Datum/tid', 'Regnr Bil', 'Regnr Släp', 'Respondent (read-only)', 'Skapat (read-only)', 'Senast ändrat (read-only)', 'Formulärsvar ID (read-only)'].includes(question)) return null;
                                                                
                                                                const isEmpty = !answer || String(answer).trim() === '';
                                                                let iconEl = <Icon name="circle-check" className="w-5 h-5 text-green-500" />;
                                                                
                                                                if (isEmpty) {
                                                                    iconEl = <Icon name="minus-circle" className="w-5 h-5 text-slate-300" />;
                                                                } else {
                                                                    const f = String(answer).trim().charAt(0);
                                                                    if (f === '3') iconEl = <Icon name="circle-x" className="w-5 h-5 text-red-600" />;
                                                                    else if (f === '2') iconEl = <Icon name="triangle-alert" className="w-5 h-5 text-yellow-500" />;
                                                                }
                                                                
                                                                return (
                                                                    <div key={i} className={`flex justify-between items-center p-3.5 border rounded-xl transition-all cursor-help ${isEmpty ? 'bg-slate-50/50 border-slate-100 text-slate-400' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700'}`} title={`Fråga: ${question}\n\nSvar: ${isEmpty ? 'Inget svar' : answer}`}>
                                                                        <span className={`text-sm font-medium truncate pr-2 ${isEmpty ? 'italic' : ''}`}>{shortenQuestion(question)} {isEmpty && <span className="text-[9px] ml-2 font-bold uppercase bg-slate-200/70 text-slate-500 px-1.5 py-0.5 rounded">Ej besvarad</span>}</span>
                                                                        <div className="shrink-0 ml-2">{iconEl}</div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </>
                                                )}
                                            </div>

                                            {/* DEL 2: EFTER KÖRNING */}
                                            <div className="relative">
                                                <div className="absolute left-6 -top-8 bottom-0 w-0.5 bg-slate-200 z-0"></div>
                                                <div className="relative z-10 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm ml-0">
                                                    <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="parking" className="w-5 h-5 text-blue-600" /> 2. Efter körning (Avslutat pass)</h3>
                                                    {currentModalPostCheck ? (
                                                        <>
                                                            <div className="flex flex-wrap gap-4 p-4 bg-slate-50 rounded-xl border border-slate-100 mb-6">
                                                                <div className="flex-1 min-w-[120px]"><span className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Tidpunkt (Avslut)</span><span className="font-medium text-slate-800">{currentModalPostCheck['Datum/tid']}</span></div>
                                                                <div className="flex-1 min-w-[160px]"><span className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Status (Efter)</span>
                                                                    {currentModalPostStatus === 'OK' && <span className="font-bold text-green-600 flex items-start gap-1"><Icon name="circle-check" className="w-4 h-4 mt-0.5 shrink-0"/> Godkänd</span>}
                                                                    {currentModalPostStatus === 'WARNING' && <span className="font-bold text-yellow-600 flex items-start gap-1"><Icon name="triangle-alert" className="w-4 h-4 mt-0.5 shrink-0"/> Egen åtgärd</span>}
                                                                    {currentModalPostStatus === 'ERROR' && <span className="font-bold text-red-600 flex items-start gap-1"><Icon name="circle-x" className="w-4 h-4 mt-0.5 shrink-0"/> Fel att rapportera</span>}
                                                                    {currentModalPostStatus === 'INCOMPLETE' && <span className="font-bold text-orange-600 flex items-start gap-1"><Icon name="file-question" className="w-4 h-4 mt-0.5 shrink-0"/> Ofullständig</span>}
                                                                </div>
                                                            </div>
                                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                                {Object.entries(currentModalPostCheck).map(([question, answer], i) => {
                                                                    if (['Datum/tid', 'Regnr Bil', 'Regnr Släp', 'Respondent (read-only)', 'Skapat (read-only)', 'Senast ändrat (read-only)', 'Formulärsvar ID (read-only)'].includes(question)) return null;
                                                                    
                                                                    const isEmpty = !answer || String(answer).trim() === '';
                                                                    let iconEl = <Icon name="circle-check" className="w-5 h-5 text-green-500" />;
                                                                    
                                                                    if (isEmpty) {
                                                                        iconEl = <Icon name="minus-circle" className="w-5 h-5 text-slate-300" />;
                                                                    } else {
                                                                        const f = String(answer).trim().charAt(0);
                                                                        if (f === '3') iconEl = <Icon name="circle-x" className="w-5 h-5 text-red-600" />;
                                                                        else if (f === '2') iconEl = <Icon name="triangle-alert" className="w-5 h-5 text-yellow-500" />;
                                                                    }
                                                                    
                                                                    return (
                                                                        <div key={i} className={`flex justify-between items-center p-3.5 border rounded-xl transition-all cursor-help ${isEmpty ? 'bg-slate-50/50 border-slate-100 text-slate-400' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700'}`} title={`Fråga: ${question}\n\nSvar: ${isEmpty ? 'Inget svar' : answer}`}>
                                                                            <span className={`text-sm font-medium truncate pr-2 ${isEmpty ? 'italic' : ''}`}>{shortenQuestion(question)} {isEmpty && <span className="text-[9px] ml-2 font-bold uppercase bg-slate-200/70 text-slate-500 px-1.5 py-0.5 rounded">Ej besvarad</span>}</span>
                                                                            <div className="shrink-0 ml-2">{iconEl}</div>
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </>
                                                    ) : (
                                                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-8 text-center"><Icon name="clock-4" className="w-10 h-10 mx-auto text-slate-300 mb-3" /><p className="font-bold text-slate-600">Körpasset pågår (Ej avslutat)</p><p className="text-sm text-slate-500 mt-1 max-w-md mx-auto">Systemet inväntar att chauffören gör en "Kontroll efter körning" för detta pass.</p></div>
                                                    )}
                                                </div>
                                            </div>
                                            
                                            <div className="mt-6 bg-slate-50 border border-slate-200 rounded-xl p-4">
                                                <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Symbolförklaring & Status</h4>
                                                <div className="space-y-3 text-sm">
                                                    <div className="flex items-start gap-3"><Icon name="circle-check" className="w-5 h-5 text-green-500 shrink-0 mt-0.5" /><span className="text-slate-700 font-medium">Kontrollerad utan anmärkning.</span></div>
                                                    <div className="flex items-start gap-3"><Icon name="triangle-alert" className="w-5 h-5 text-yellow-500 shrink-0 mt-0.5" /><span className="text-slate-700 font-medium">Proaktiv: Chaufför har åtgärdat upptäckta brister.</span></div>
                                                    <div className="flex items-start gap-3"><Icon name="circle-x" className="w-5 h-5 text-red-600 shrink-0 mt-0.5" /><span className="text-slate-700 font-medium">Rapporterat fel: Kräver externt underhåll.</span></div>
                                                    <div className="flex items-start gap-3"><Icon name="file-question" className="w-5 h-5 text-orange-500 shrink-0 mt-0.5" /><span className="text-slate-700 font-medium">Ofullständig: Kritisk fråga (t.ex. bromsar, däck) ej besvarad.</span></div>
                                                    <div className="flex items-start gap-3"><Icon name="minus-circle" className="w-5 h-5 text-slate-300 shrink-0 mt-0.5" /><span className="text-slate-700 font-medium">Överhoppad fråga (ej kritisk, accepteras av systemet).</span></div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="p-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3 rounded-b-2xl"><button onClick={() => setSelectedVehicle(null)} className="px-6 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-semibold transition-colors">Stäng</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
