                                        <option value="7days">Senaste 7 dagarna</option>
                                        <option value="thisMonth">Denna månad</option>
                                        <option value="lastMonth">Föregående månad</option>
                                        <option value="ytd">Hittills i år</option>
                                        <option value="custom">Eget datumval...</option>
                                    </select>
                                </div>
                                {reportPeriod === 'custom' && (
                                    <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg">
                                        <input type="date" value={customReportStart} onChange={e=>setCustomReportStart(e.target.value)} className="bg-transparent border-none text-sm text-slate-700 font-medium focus:outline-none" />
                                        <span className="text-slate-400">-</span>
                                        <input type="date" value={customReportEnd} onChange={e=>setCustomReportEnd(e.target.value)} className="bg-transparent border-none text-sm text-slate-700 font-medium focus:outline-none" />
                                    </div>
                                )}
                                <button onClick={() => window.print()} className="flex items-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-lg font-medium shadow-sm transition-all hover:bg-slate-900" title="Skriver ut den flik du tittar på nu">
                                    <Icon name="printer" className="w-4 h-4" /> Exportera PDF
                                </button>
                            </div>
                        </div>

                        {/* Flik-navigering */}
                        <div className="flex overflow-x-auto gap-2 mb-8 border-b border-slate-200 no-print">
                            <button onClick={()=>setReportTab('overview')} className={`px-4 py-3 font-bold text-sm border-b-2 transition-colors whitespace-nowrap flex items-center gap-2 ${reportTab==='overview'?'border-blue-600 text-blue-700':'border-transparent text-slate-500 hover:text-slate-700'}`}>
                                <Icon name="layout-dashboard" className="w-4 h-4"/> Översikt
                            </button>
                            <button onClick={()=>setReportTab('workshop')} className={`px-4 py-3 font-bold text-sm border-b-2 transition-colors whitespace-nowrap flex items-center gap-2 ${reportTab==='workshop'?'border-blue-600 text-blue-700':'border-transparent text-slate-500 hover:text-slate-700'}`}>
                                <Icon name="wrench" className="w-4 h-4"/> Fordon & Kvalitet (Verkstad)
                            </button>
                            <button onClick={()=>setReportTab('hr')} className={`px-4 py-3 font-bold text-sm border-b-2 transition-colors whitespace-nowrap flex items-center gap-2 ${reportTab==='hr'?'border-blue-600 text-blue-700':'border-transparent text-slate-500 hover:text-slate-700'}`}>
                                <Icon name="users" className="w-4 h-4"/> Chaufförer & Beteende (Personal)
                            </button>
                            {reportDepartments.length === 0 && (
                                <button onClick={()=>setReportTab('compare')} className={`px-4 py-3 font-bold text-sm border-b-2 transition-colors whitespace-nowrap flex items-center gap-2 ${reportTab==='compare'?'border-blue-600 text-blue-700':'border-transparent text-slate-500 hover:text-slate-700'}`}>
                                    <Icon name="bar-chart-horizontal" className="w-4 h-4"/> Avdelningsjämförelse
                                </button>
                            )}
                        </div>

                        {/* Print Header (Syns bara i PDF) */}
                        <div className="hidden print-only mb-8 border-b border-slate-200 pb-4">
                            <h1 className="text-3xl font-bold text-slate-800 mb-2">Statistikrapport: Daglig Tillsyn</h1>
                            <div className="flex gap-6 text-sm text-slate-600 font-bold">
                                <span>Avdelning: {reportDepartments.length === 0 ? 'Alla avdelningar' : reportDepartments.join(', ')}</span>
                                <span>Period: {reportPeriod === 'custom' ? `${customReportStart} - ${customReportEnd}` : reportPeriod}</span>
                                <span className="ml-auto">Utskriven: {new Date().toLocaleDateString('sv-SE')}</span>
                            </div>
                        </div>

                        {loadingReport ? (
                            <div className="text-center py-20 text-slate-400 no-print">
                                <Icon name="loader-2" className="animate-spin w-12 h-12 mx-auto mb-4" />
                                <p className="font-semibold text-lg">Hämtar och beräknar data från Colix...</p>
                            </div>
                        ) : totalChecks === 0 ? (
                            <div className="text-center py-20 bg-white rounded-2xl border border-slate-200 shadow-sm no-print">
                                <Icon name="bar-chart-3" className="w-16 h-16 text-slate-300 mx-auto mb-4" />
                                <h2 className="text-xl font-bold text-slate-600 mb-1">Ingen data hittades</h2>
                                <p className="text-slate-500">Det finns inga registrerade kontroller för den valda avdelningen/perioden.</p>
                            </div>
                        ) : (
                            <div className="print-section">
                                
                                {/* --- FLIK 1: ÖVERSIKT --- */}
                                <div className={reportTab === 'overview' ? 'block' : 'hidden print:hidden'}>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                                        <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm print-break-inside-avoid">
                                            <h3 className="text-slate-500 font-bold text-xs uppercase tracking-wider mb-2">Totala Kontroller</h3>
                                            <div className="text-4xl font-black text-slate-800 mb-2">{totalChecks.toLocaleString('sv-SE')}</div>
                                            <div className="flex gap-3 text-xs font-bold text-slate-400">
                                                <span className="flex items-center gap-1"><Icon name="truck" className="w-3 h-3"/> {totalPre} före</span>
                                                <span className="flex items-center gap-1"><Icon name="parking" className="w-3 h-3"/> {totalPost} efter</span>
                                            </div>
                                        </div>
                                        <div className={`bg-white p-5 rounded-2xl border shadow-sm print-break-inside-avoid ${compliancePct >= 90 ? 'border-green-300' : (compliancePct >= 70 ? 'border-yellow-300' : 'border-red-300')}`}>
                                            <h3 className="text-slate-500 font-bold text-xs uppercase tracking-wider mb-2">Slutförandegrad</h3>
                                            <div className={`text-4xl font-black mb-1 ${compliancePct >= 90 ? 'text-green-600' : (compliancePct >= 70 ? 'text-yellow-600' : 'text-red-600')}`}>{compliancePct}%</div>
                                            <div className="text-xs font-medium text-slate-500 leading-tight">Andel av avdelningens aktiva fordon som kontrollerats.</div>
                                        </div>
                                        <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm print-break-inside-avoid">
                                            <h3 className="text-slate-500 font-bold text-xs uppercase tracking-wider mb-2">Fordonsstatus</h3>
                                            <div className="text-4xl font-black text-red-600 mb-1">{errorRatio}% <span className="text-lg font-bold text-slate-500">Rapporterade fel</span></div>
                                            <div className="text-xs font-bold text-yellow-600 flex items-center gap-1"><Icon name="check-circle" className="w-3 h-3"/> {warningRatio}% löstes direkt av chaufför</div>
                                        </div>
                                        <div className={`p-5 rounded-2xl border shadow-sm print-break-inside-avoid ${healthIndex >= 90 ? 'bg-gradient-to-br from-blue-600 to-indigo-700 border-blue-800 text-white' : 'bg-white border-slate-200 text-slate-800'}`}>
                                            <h3 className={`font-bold text-xs uppercase tracking-wider mb-2 ${healthIndex >= 90 ? 'text-blue-200' : 'text-slate-500'}`}>Helhets-index</h3>
                                            <div className="text-5xl font-black mb-1">{healthIndex} <span className="text-lg font-bold opacity-60">/ 100</span></div>
                                            <div className={`text-xs font-medium leading-tight ${healthIndex >= 90 ? 'text-blue-100' : 'text-slate-500'}`}>Mäter slutförandegrad kontra rena fel. Gula åtgärder straffar ej indexet.</div>
                                        </div>
                                    </div>

                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm print-break-inside-avoid">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-bold text-lg text-slate-800">Trend över tid (Kontroller)</h3>
                                            <div className="flex gap-4 text-xs font-bold text-slate-500">
                                                <span className="flex items-center gap-1"><div className="w-3 h-1 bg-blue-500 rounded-full"></div> Före</span>
                                                <span className="flex items-center gap-1"><div className="w-3 h-1 bg-indigo-500 rounded-full"></div> Efter</span>
                                            </div>
                                        </div>
                                        {trendData.length > 1 ? (
                                            <div className="relative w-full h-64 pt-4 border-b border-slate-200">
                                                <svg viewBox="0 0 1000 200" className="w-full h-full overflow-visible" preserveAspectRatio="none">
                                                    {/* Stödlinjer */}
                                                    <line x1="35" y1="50" x2="1000" y2="50" stroke="#f1f5f9" strokeWidth="1" />
                                                    <line x1="35" y1="100" x2="1000" y2="100" stroke="#f1f5f9" strokeWidth="1" />
                                                    <line x1="35" y1="150" x2="1000" y2="150" stroke="#f1f5f9" strokeWidth="1" />
                                                    
                                                    {/* Y-axis Skala */}
                                                    <text x="0" y="54" fontSize="11" fill="#94a3b8" fontWeight="bold">{Math.round(maxTrendVal)}</text>
                                                    <text x="0" y="104" fontSize="11" fill="#94a3b8" fontWeight="bold">{Math.round(maxTrendVal/2)}</text>
                                                    <text x="0" y="154" fontSize="11" fill="#94a3b8" fontWeight="bold">0</text>
                                                    
                                                    {/* Data linjer */}
                                                    <polyline points={prePoints} fill="none" stroke="#3b82f6" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" />
                                                    <polyline points={postPoints} fill="none" stroke="#6366f1" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" />
                                                    
                                                    {/* Punkter (cirklar) */}
                                                    {trendData.map((d, i) => {
                                                        const x = 40 + i * (960 / Math.max(1, trendData.length - 1));
                                                        return (
                                                            <g key={i}>
                                                                <circle cx={x} cy={150 - ((d.pre / maxTrendVal) * 100)} r="5" fill="#fff" stroke="#3b82f6" strokeWidth="2" className="cursor-crosshair hover:r-[7px] transition-all">
                                                                    <title>{d.date}&#10;Före-kontroller: {d.pre} st</title>
                                                                </circle>
                                                                <circle cx={x} cy={150 - ((d.post / maxTrendVal) * 100)} r="5" fill="#fff" stroke="#6366f1" strokeWidth="2" className="cursor-crosshair hover:r-[7px] transition-all">
                                                                    <title>{d.date}&#10;Efter-kontroller: {d.post} st</title>
                                                                </circle>
                                                            </g>
                                                        );
                                                    })}
                                                </svg>
                                                <div className="flex justify-between mt-3 text-[10px] text-slate-400 font-bold uppercase tracking-wider px-1 ml-10">
                                                    <span>{trendData[0].date.substring(5)}</span>
                                                    {trendData.length > 2 && <span>{trendData[Math.floor(trendData.length/2)].date.substring(5)}</span>}
                                                    <span>{trendData[trendData.length-1].date.substring(5)}</span>
                                                </div>
                                            </div>
                                        ) : (
                                            <p className="text-sm text-slate-400 italic">Behövs fler dagar för att rita en trend.</p>
                                        )}
                                    </div>
                                    
                                    {/* NYTT: Diagram över tid på dygnet */}
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mt-6 print-break-inside-avoid">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-bold text-lg text-slate-800">Tidpunkt för kontroller (Dygnets timmar)</h3>
                                            <div className="flex gap-4 text-xs font-bold text-slate-500">
                                                <span className="flex items-center gap-1"><div className="w-3 h-3 bg-blue-500 rounded-sm"></div> Före</span>
                                                <span className="flex items-center gap-1"><div className="w-3 h-3 bg-indigo-500 rounded-sm"></div> Efter</span>
                                            </div>
                                        </div>
                                        <div className="relative w-full h-48 pt-4">
                                            <svg viewBox="0 0 1000 200" className="w-full h-full overflow-visible" preserveAspectRatio="none">
                                                <line x1="35" y1="50" x2="1000" y2="50" stroke="#f1f5f9" strokeWidth="1" />
                                                <line x1="35" y1="100" x2="1000" y2="100" stroke="#f1f5f9" strokeWidth="1" />
                                                <line x1="35" y1="150" x2="1000" y2="150" stroke="#f1f5f9" strokeWidth="1" />
                                                
                                                <text x="0" y="54" fontSize="11" fill="#94a3b8" fontWeight="bold">{Math.round(maxTimeVal)}</text>
                                                <text x="0" y="104" fontSize="11" fill="#94a3b8" fontWeight="bold">{Math.round(maxTimeVal/2)}</text>
                                                <text x="0" y="154" fontSize="11" fill="#94a3b8" fontWeight="bold">0</text>
                                                
                                                {timeData.map((d, i) => {
                                                    const x = 40 + i * (960 / 24);
                                                    const w = (960 / 24) * 0.35;
                                                    const hPre = (d.pre / maxTimeVal) * 100;
                                                    const hPost = (d.post / maxTimeVal) * 100;
                                                    return (
                                                        <g key={i}>
                                                            <rect x={x} y={150 - hPre} width={w} height={hPre} fill="#3b82f6" className="cursor-crosshair hover:opacity-80 transition-opacity">
                                                                <title>{String(i).padStart(2, '0')}:00 - {String(i+1).padStart(2, '0')}:00&#10;Före-kontroller: {d.pre} st</title>
                                                            </rect>
                                                            <rect x={x + w + 1} y={150 - hPost} width={w} height={hPost} fill="#6366f1" className="cursor-crosshair hover:opacity-80 transition-opacity">
                                                                <title>{String(i).padStart(2, '0')}:00 - {String(i+1).padStart(2, '0')}:00&#10;Efter-kontroller: {d.post} st</title>
                                                            </rect>
                                                            {i % 2 === 0 && <text x={x + w} y={170} fontSize="10" fill="#94a3b8" fontWeight="bold" textAnchor="middle">{String(i).padStart(2, '0')}</text>}
                                                        </g>
                                                    );
                                                })}
                                            </svg>
                                        </div>
                                    </div>
                                </div>

                                {/* --- FLIK 2: VERKSTAD --- */}
                                <div className={reportTab === 'workshop' ? 'block' : 'hidden print:hidden'}>
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm print-break-inside-avoid lg:row-span-2">
                                            <h3 className="font-bold text-lg text-slate-800 mb-1 flex items-center gap-2">
                                                <Icon name="bar-chart-3" className="text-blue-500 w-5 h-5"/> Vanligaste anmärkningarna
                                            </h3>
                                            <p className="text-xs text-slate-500 mb-5">Visar vad som krånglar oftast.</p>
                                            
                                            {/* NYTT: Radardiagram */}
                                            {renderRadarChart()}

                                            <div className="space-y-4">
                                                {topDefects.slice(0, 8).map((d, idx) => (
                                                    <div key={d.name}>
                                                        <div className="flex justify-between text-sm font-medium text-slate-700 mb-1">
                                                            <span className="truncate pr-2">{idx+1}. {d.name}</span>
                                                            <span className="font-bold text-slate-500">{d.total} st</span>
                                                        </div>
                                                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden flex">
                                                            {d.warning > 0 && <div style={{width: `${(d.warning/d.total)*100}%`}} className="bg-yellow-400 h-full" title="Egen åtgärd"></div>}
                                                            {d.error > 0 && <div style={{width: `${(d.error/d.total)*100}%`}} className="bg-red-500 h-full" title="Rapporterat fel"></div>}
                                                        </div>
                                                    </div>
                                                ))}
                                                {topDefects.length === 0 && <p className="text-sm text-slate-400 italic">Inga anmärkningar funna.</p>}
                                            </div>
                                        </div>

                                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm print-break-inside-avoid">
                                            <h3 className="font-bold text-lg text-slate-800 mb-1 flex items-center gap-2">
                                                <Icon name="alert-triangle" className="text-red-500 w-5 h-5"/> Svarta listan (Fordon)
                                            </h3>
                                            <p className="text-xs text-slate-500 mb-5">Fordon med flest rena fel (Rött).</p>
                                            <div className="space-y-3">
                                                {topErrorVehicles.map((v, idx) => (
                                                    <div key={v.reg} className="flex justify-between items-center border-b border-slate-50 pb-2">
                                                        <div className="flex items-center gap-3 overflow-hidden">
                                                            <span className="text-slate-400 font-bold text-sm shrink-0 w-4">{idx + 1}.</span>
                                                            <span className="font-bold text-slate-700 truncate">{v.display}</span>
                                                        </div>
                                                        <span className="bg-red-50 text-red-700 font-bold text-xs px-2.5 py-1 rounded border border-red-200 shrink-0 ml-2">
                                                            {v.errors} fel
                                                        </span>
                                                    </div>
                                                ))}
                                                {topErrorVehicles.length === 0 && <p className="text-sm text-slate-400 italic">Härligt, inga fel inrapporterade!</p>}
                                            </div>
                                        </div>

                                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm print-break-inside-avoid">
                                            <h3 className="font-bold text-lg text-slate-800 mb-1 flex items-center gap-2">
                                                <Icon name="ghost" className="text-slate-400 w-5 h-5"/> Oanvända fordon
                                            </h3>
                                            <p className="text-xs text-slate-500 mb-5">Fordon i systemet med 0 kontroller.</p>
                                            <div className="max-h-96 overflow-y-auto pr-2">
                                                {unusedVehicles.map(v => (
                                                    <div key={v['Namn']} className="flex justify-between items-center py-1.5 border-b border-slate-50">
                                                        <span className="font-medium text-slate-600 text-sm truncate">{v.Internreferens ? `${v.Internreferens} (${v['Namn']})` : v['Namn']}</span>
                                                        <span className="text-[10px] uppercase font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded">Missad</span>
                                                    </div>
                                                ))}
                                                {unusedVehicles.length === 0 && <p className="text-sm text-green-600 font-medium flex items-center gap-1"><Icon name="check-circle" className="w-4 h-4"/> Alla fordon är kontrollerade!</p>}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* --- FLIK 3: PERSONAL --- */}
                                <div className={reportTab === 'hr' ? 'block' : 'hidden print:hidden'}>
                                    
                                    <div className="bg-indigo-50 border border-indigo-200 p-6 rounded-2xl mb-6 shadow-sm print-break-inside-avoid">
                                        <h3 className="font-bold text-indigo-900 mb-2 flex items-center gap-2 text-lg">
                                            <Icon name="lightbulb" className="text-indigo-600 w-6 h-6"/> Insikter & Avvikelser (Tick-and-go detektion)
                                        </h3>
                                        <p className="text-sm text-indigo-800 mb-4 max-w-4xl leading-relaxed">
                                            Systemet jämför chaufförer som kör samma fordon. Om en bil regelbundet får anmärkningar av andra, men <i>alltid</i> markeras som felfri av en specifik förare, flaggas det här nedanför. Ett bra underlag för dialog om att följa rutinerna.
                                        </p>
                                        {smartInsights.length > 0 ? (
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                {smartInsights.map((insight, i) => (
                                                    <div key={i} className="bg-white rounded-xl p-4 border border-indigo-100 shadow-sm relative overflow-hidden">
                                                        <div className="absolute top-0 left-0 w-1 h-full bg-indigo-400"></div>
                                                        <div className="font-bold text-slate-800 mb-1">{insight.driver}</div>
                                                        <div className="text-xs text-slate-600 mb-2"><Icon name="truck" className="w-3 h-3 inline text-slate-400"/> Fordon: {insight.vehicle}</div>
                                                        <div className="text-xs text-slate-500">
                                                            Har utfört <b>{insight.checks} felfria pass</b> på en bil som i snitt har <b>anmärkningar i {insight.avgRate}%</b> av fallen när andra kör den.
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            <div className="bg-white/60 text-indigo-700 text-sm font-medium py-3 px-4 rounded-xl border border-indigo-100 inline-flex items-center gap-2">
                                                <Icon name="check-circle" className="w-5 h-5 text-indigo-500" /> Inga avvikande rapporteringsmönster upptäcktes för denna period.
                                            </div>
                                        )}
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm print-break-inside-avoid">
                                            <h3 className="font-bold text-lg text-slate-800 mb-1 flex items-center gap-2">
                                                <Icon name="heart-handshake" className="text-yellow-500 w-5 h-5"/> Mest proaktiva (Vardagshjältar)
                                            </h3>
                                            <p className="text-xs text-slate-500 mb-5">Förare med flest egna åtgärder (Gula markeringar).</p>
                                            <div className="space-y-3">
                                                {topProactiveDrivers.filter(d=>d.warnings > 0).map((d, idx) => (
                                                    <div key={d.name} className="flex justify-between items-center border-b border-slate-50 pb-2">
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-slate-400 font-bold text-sm w-4">{idx + 1}.</span>
                                                            <span className="font-bold text-slate-700">{d.name}</span>
                                                        </div>
                                                        <span className="bg-yellow-50 text-yellow-700 font-bold text-xs px-2.5 py-1 rounded border border-yellow-200 shrink-0">
                                                            {d.warnings} åtgärder
                                                        </span>
                                                    </div>
                                                ))}
                                                {topProactiveDrivers.filter(d=>d.warnings > 0).length === 0 && <p className="text-sm text-slate-400 italic">Inga proaktiva åtgärder registrerade.</p>}
                                            </div>
                                        </div>

                                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm print-break-inside-avoid">
                                            <h3 className="font-bold text-lg text-slate-800 mb-1 flex items-center gap-2">
                                                <Icon name="trophy" className="text-blue-500 w-5 h-5"/> Flitigaste inlämnarna
                                            </h3>
                                            <p className="text-xs text-slate-500 mb-5">Förare som skickat in flest totala kontroller.</p>
                                            <div className="space-y-3">
                                                {topDiligentDrivers.map((d, idx) => (
                                                    <div key={d.name} className="flex justify-between items-center border-b border-slate-50 pb-2">
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-slate-400 font-bold text-sm w-4">{idx + 1}.</span>
                                                            <span className="font-medium text-slate-700">{d.name}</span>
                                                        </div>
                                                        <span className="bg-slate-100 text-slate-600 font-bold text-xs px-2.5 py-1 rounded shrink-0">
                                                            {d.total} st
                                                        </span>
                                                    </div>
                                                ))}
                                                {topDiligentDrivers.length === 0 && <p className="text-sm text-slate-400 italic">Ingen data.</p>}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* --- FLIK 4: AVDELNINGSJÄMFÖRELSE --- */}
                                {reportDepartments.length === 0 && (
                                    <div className={reportTab === 'compare' ? 'block' : 'hidden print:hidden'}>
                                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm print-break-inside-avoid">
                                            <h3 className="font-bold text-lg text-slate-800 mb-2 flex items-center gap-2">
                                                <Icon name="bar-chart-horizontal" className="text-blue-600 w-5 h-5"/> Avdelningskampen
                                            </h3>
                                            <p className="text-sm text-slate-500 mb-8">Visar Helhets-index och Slutförandegrad (Compliance) per avdelning. Sorterat efter bäst index.</p>
                                            
                                            <div className="space-y-6">
                                                {deptStats.map(d => (
                                                    <div key={d.name} className="relative">
                                                        <div className="flex justify-between items-end mb-1">
                                                            <span className="font-bold text-slate-700">{d.name}</span>
                                                            <div className="text-right">
                                                                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider mr-4">Index: <span className="text-blue-600 text-base">{d.health}</span></span>
                                                                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Compliance: <span className="text-slate-700">{d.compliance}%</span></span>
                                                            </div>
                                                        </div>
                                                        <div className="w-full bg-slate-100 h-3 rounded-full overflow-hidden relative">
                                                            <div style={{width: `${Math.min(100, d.health)}%`}} className="bg-blue-500 h-full absolute top-0 left-0 rounded-full z-10" title={`Helhets-index: ${d.health}`}></div>
                                                            <div style={{width: `${Math.min(100, d.compliance)}%`}} className="bg-slate-300 h-full absolute top-0 left-0 rounded-full opacity-50" title={`Slutförandegrad: ${d.compliance}%`}></div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                            </div>
                        )}
                    </div>
                );
            };

            // ==========================================
            // MODAL LOGIK (Detaljvy för Standard)
            // ==========================================
            let currentModalCheck = null;
            let currentModalStatus = 'MISSING';
            let currentModalPostCheck = null;
            let currentModalPostStatus = 'MISSING';

            if (selectedVehicle && currentView === 'overview') {
                if (selectedVehicle.vehicle.isUnknown) {
                    currentModalCheck = selectedVehicle.vehicle.checks.all[currentCheckIndex];
                    currentModalStatus = currentModalCheck ? analyzeCheckStatus(currentModalCheck) : 'MISSING';
                    currentModalPostCheck = selectedVehicle.vehicle.postChecks.all[currentCheckIndex];
                    currentModalPostStatus = currentModalPostCheck ? analyzeCheckStatus(currentModalPostCheck) : 'MISSING';
                } else {
                    if (selectedVehicle.orphanedPost) {
                         currentModalPostCheck = selectedVehicle.orphanedPost.all[currentCheckIndex];
                         currentModalPostStatus = currentModalPostCheck ? analyzeCheckStatus(currentModalPostCheck) : 'MISSING';
                    } else {
                         currentModalCheck = selectedVehicle.checkData.all[currentCheckIndex];
                         currentModalStatus = currentModalCheck ? analyzeCheckStatus(currentModalCheck) : 'MISSING';
                         currentModalPostCheck = currentModalCheck ? getPostCheckForPreCheck(currentModalCheck) : null;
                         currentModalPostStatus = currentModalPostCheck ? analyzeCheckStatus(currentModalPostCheck) : 'MISSING';
                    }
                }
            }

            const rawModalTrailer = currentModalCheck ? currentModalCheck['Regnr Släp'] : (currentModalPostCheck ? currentModalPostCheck['Regnr Släp'] : null);
            const modalDisplayTrailer = formatTrailerDisplay(rawModalTrailer);


            // ==========================================
            // ROUTER: VILKEN VY SKA VISAS?
            // ==========================================
            if (currentView === 'tv') {
                return (
                    <div className="min-h-screen bg-slate-100 flex flex-col p-2 md:p-4 overflow-hidden">
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 px-4 py-2 mb-4 flex justify-between items-center shrink-0 relative z-20">
                            <div className="flex items-center gap-4">
                                <h1 className="text-xl font-black text-slate-800 uppercase tracking-wide flex items-center gap-2">
                                    <Icon name="monitor" className="text-blue-600 w-5 h-5" />
                                    Daglig Kontroll
                                </h1>
                                <div className="hidden sm:flex items-center gap-2 text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-lg">
                                    <Icon name="calendar" className="w-4 h-4" />
                                    {selectedDate}
                                </div>

                                {/* Fordons-pill i TV-vy */}
                                <div className="hidden md:flex items-center gap-2 text-xs font-medium text-slate-500 bg-slate-50 border border-slate-200 px-2 py-1 rounded-lg">
                                    <Icon name="truck" className="w-3.5 h-3.5" />
                                    <span title="När fordonsregistret senast hämtades">{lastVehicleUpdate ? lastVehicleUpdate.split(' ')[0] === new Date().toLocaleDateString('sv-SE') ? lastVehicleUpdate.split(' ')[1] : lastVehicleUpdate.split(' ')[0] : '...'}</span>
                                    <button onClick={fetchVehicles} disabled={loadingVehicles} className="text-blue-600 hover:text-blue-800 transition-colors" title="Uppdatera fordonsfil">
                                        <Icon name="refresh-cw" className={`w-3 h-3 ${loadingVehicles ? 'animate-spin' : ''}`} />
                                    </button>
                                </div>

                                {tvSettings.carouselSpeed > 0 && tvSlides.length > 1 && (
                                    <div className="text-[10px] font-bold text-green-600 uppercase tracking-wider flex items-center gap-1 bg-green-50 px-2 py-1 rounded">
                                        <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                        Karusell på ({tvSettings.carouselSpeed}s)
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center gap-2">
                                {tvSlides.length > 1 && (
                                    <div className="flex items-center gap-1 mr-2 bg-slate-100 p-1 rounded-lg">
                                        <button onClick={prevTvSlide} className="p-1.5 text-slate-500 hover:text-slate-800 hover:bg-slate-200 rounded"><Icon name="chevron-left" className="w-4 h-4"/></button>
                                        <span className="text-xs font-bold text-slate-600 px-2">{currentSlideIndex + 1} / {tvSlides.length}</span>
                                        <button onClick={nextTvSlide} className="p-1.5 text-slate-500 hover:text-slate-800 hover:bg-slate-200 rounded"><Icon name="chevron-right" className="w-4 h-4"/></button>
                                    </div>
                                )}
                                <button onClick={() => fetchChecks(true)} className="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Uppdatera kontroller">
                                    <Icon name="refresh-cw" className={`w-5 h-5 ${refreshing ? 'animate-spin text-blue-600' : ''}`} />
                                </button>
                                <button onClick={() => setShowTVSettings(true)} className="p-2 text-slate-500 hover:text-slate-800 hover:bg-slate-200 rounded-lg transition-colors">
                                    <Icon name="settings" className="w-5 h-5" />
                                </button>
                                <div className="h-6 w-px bg-slate-300 mx-1"></div>
                                <button onClick={() => setCurrentView('overview')} className="px-3 py-1.5 bg-slate-200 text-slate-700 text-sm font-bold rounded-lg hover:bg-slate-300 transition-colors">
                                    Avsluta TV-vy
                                </button>
                            </div>
                        </div>

                        {/* Paginering & Karusell visning */}
                        <div className="flex-1 overflow-hidden relative">
                            {tvSlides.length === 0 ? (
                                <div className="flex h-full items-center justify-center text-slate-400">Inga fordon att visa.</div>
                            ) : (
                                <div 
                                    className="absolute inset-0 flex transition-transform duration-700 ease-in-out"
                                    style={{ transform: `translateX(-${currentSlideIndex * 100}%)` }}
                                >
                                    {tvSlides.map((slide) => (
                                        <div key={slide.id} className="w-full h-full flex-shrink-0 px-2 pb-2">
                                            <div className={`h-full flex flex-col p-4 rounded-xl border overflow-y-auto hide-scrollbar ${slide.isUnknown ? 'bg-indigo-50/50 border-indigo-200' : (slide.isCustom ? 'bg-blue-50/30 border-blue-200' : 'bg-white/50 border-slate-200/60')}`}>
                                                <div className="flex justify-between items-center mb-4 pl-1 shrink-0">
                                                    <h2 className={`text-lg font-bold uppercase tracking-wider flex items-center gap-2 ${slide.isUnknown ? 'text-indigo-600' : (slide.isCustom ? 'text-blue-600' : 'text-slate-600')}`}>
                                                        {slide.isUnknown && <Icon name="help-circle" className="w-5 h-5" />}
                                                        {slide.isCustom && <Icon name="folder-heart" className="w-5 h-5" />}
                                                        {slide.depName} <span className="opacity-50 text-sm">({slide.vehicles.length} visade)</span>
                                                    </h2>
                                                    {slide.totalPages > 1 && (
                                                        <div className="flex gap-1.5 bg-white/50 p-1.5 rounded-full border border-slate-200/60">
                                                            {Array.from({ length: slide.totalPages }).map((_, i) => (
                                                                <div key={i} className={`w-2.5 h-2.5 rounded-full ${i + 1 === slide.pageIndex ? 'bg-blue-600 shadow-sm' : 'bg-slate-300'}`}></div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="grid grid-cols-[repeat(auto-fill,minmax(180px,1fr))] gap-2 sm:gap-3 auto-rows-max">
                                                    {slide.vehicles.map(v => renderTVVehicleCard(v))}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* TV Settings Modal */}
                        {showTVSettings && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-in zoom-in-95">
                                    <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                        <h2 className="text-lg font-bold text-slate-800">TV-vy Inställningar</h2>
                                        <button onClick={() => setShowTVSettings(false)} className="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-200">
                                            <Icon name="x" className="w-6 h-6" />
                                        </button>
                                    </div>
                                    <div className="p-6 space-y-6 max-h-[70vh] overflow-y-auto">
                                        <div>
                                            <h3 className="font-semibold text-slate-700 mb-2 text-sm uppercase tracking-wider">Visa avdelningar</h3>
                                            <p className="text-xs text-slate-500 mb-3">Markera vilka avdelningar som ska visas på denna skärm. Om ingen markeras visas alla.</p>
                                            <div className="max-h-48 overflow-y-auto border border-slate-200 rounded-lg p-2 space-y-1">
                                                {sortedDepartments.map(dep => (
                                                    <label key={dep} className="flex items-center gap-3 p-2 hover:bg-slate-50 rounded cursor-pointer">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={tvSettings.departments.includes(dep)}
                                                            onChange={() => toggleTvDepartment(dep)}
                                                            className="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500"
                                                        />
                                                        <span className="text-sm text-slate-700 font-medium">{dep}</span>
                                                        {customDeps.hasOwnProperty(dep) && <Icon name="folder-heart" className="w-3 h-3 text-blue-400 ml-auto" />}
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                        
                                        <div className="h-px bg-slate-100 w-full"></div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <h3 className="font-semibold text-slate-700 mb-2 text-sm uppercase tracking-wider">Karusell-hastighet</h3>
                                                <select 
                                                    value={tvSettings.carouselSpeed}
                                                    onChange={(e) => setTvSettings({...tvSettings, carouselSpeed: Number(e.target.value)})}
                                                    className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 bg-white"
                                                >
                                                    <option value={0}>Avstängd</option>
                                                    <option value={5}>Var 5:e sekund</option>
                                                    <option value={10}>Var 10:e sekund</option>
                                                    <option value={15}>Var 15:e sekund</option>
                                                    <option value={20}>Var 20:e sekund</option>
                                                    <option value={30}>Var 30:e sekund</option>
                                                </select>
                                                <p className="text-[10px] text-slate-400 mt-1">Styr hur snabbt den byter "sida".</p>
                                            </div>

                                            <div>
                                                <h3 className="font-semibold text-slate-700 mb-2 text-sm uppercase tracking-wider">Bilar per sida</h3>
                                                <select 
                                                    value={tvSettings.maxPerPage}
                                                    onChange={(e) => setTvSettings({...tvSettings, maxPerPage: Number(e.target.value)})}
                                                    className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 bg-white"
                                                >
                                                    <option value={12}>12 fordon</option>
                                                    <option value={16}>16 fordon</option>
                                                    <option value={24}>24 fordon</option>
                                                    <option value={32}>32 fordon</option>
                                                    <option value={48}>48 fordon</option>
                                                </select>
                                                <p className="text-[10px] text-slate-400 mt-1">Avdelningen delas upp om den överskrider gränsen.</p>
                                            </div>
                                        </div>

                                        <div className="h-px bg-slate-100 w-full"></div>

                                        <div>
                                            <h3 className="font-semibold text-slate-700 mb-2 text-sm uppercase tracking-wider">Data-uppdatering</h3>
                                            <select 
                                                value={tvSettings.refreshInterval}
                                                onChange={(e) => setTvSettings({...tvSettings, refreshInterval: Number(e.target.value)})}
                                                className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 bg-white"
                                            >
                                                <option value={0}>Avstängd (Hämtar ej ny data)</option>
                                                <option value={1}>Hämta ny data varje minut</option>
                                                <option value={5}>Hämta var 5:e minut</option>
                                                <option value={15}>Hämta var 15:e minut</option>
                                                <option value={30}>Hämta var 30:e minut</option>
                                            </select>
                                            <p className="text-[10px] text-slate-400 mt-1">Styr hur ofta ny data hämtas i bakgrunden från Colix.</p>
                                        </div>
                                    </div>
                                    <div className="p-4 border-t border-slate-100 bg-slate-50 flex justify-end">
                                        <button onClick={() => setShowTVSettings(false)} className="px-5 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">
                                            Spara & Stäng
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (currentView === 'reports') {
                return renderReports();
            }

            // STANDARD ÖVERBLICK
            return (
                <div className="max-w-[1600px] mx-auto relative">
                    
                    {/* GLOBAL MESSAGE MODAL FÖR ATT ERSÄTTA ALERT() */}
                    {globalMessage && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in-95">
                                <div className="p-6 text-center">
                                    <div className="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Icon name="info" className="w-8 h-8"/>
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800 mb-2">{globalMessage.title}</h3>
                                    <p className="text-sm text-slate-500 mb-8">{globalMessage.message}</p>
                                    <button onClick={() => setGlobalMessage(null)} className="px-6 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-medium transition-colors w-full">
                                        Stäng
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODALER (Samma som förut) */}
                    {showCreateDepModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in-95">
                                <div className="p-6">
                                    <h3 className="text-xl font-bold text-slate-800 mb-2 flex items-center gap-2"><Icon name="folder-plus" className="w-6 h-6 text-blue-600" /> Skapa egen avdelning</h3>
                                    <p className="text-sm text-slate-500 mb-5">Egna avdelningar sparas bara för dig. Här kan du samla fordon du vill ha extra koll på, oavsett deras ursprung.</p>
                                    <input autoFocus type="text" value={newDepName} onChange={e => setNewDepName(e.target.value)} className="w-full border-2 border-slate-200 rounded-xl p-3 mb-6 focus:border-blue-500 focus:ring-0 outline-none text-slate-700 font-medium" placeholder="T.ex. Mina Nattbilar..." />
                                    <div className="flex justify-end gap-3">
                                        <button onClick={() => setShowCreateDepModal(false)} className="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-medium transition-colors">Avbryt</button>
                                        <button onClick={handleCreateDep} disabled={!newDepName.trim()} className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white rounded-xl font-medium shadow-sm transition-colors">Spara flik</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {depToDelete && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm text-center p-6 animate-in zoom-in-95">
                                <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="alert-triangle" className="w-8 h-8"/></div>
                                <h3 className="text-xl font-bold text-slate-800 mb-2">Ta bort avdelning?</h3>
                                <p className="text-sm text-slate-500 mb-8">Är du säker på att du vill ta bort "<b>{depToDelete}</b>"?<br/>Inga fordon eller kontroller raderas.</p>
                                <div className="flex justify-center gap-3">
                                    <button onClick={() => setDepToDelete(null)} className="px-6 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-medium transition-colors w-full">Avbryt</button>
                                    <button onClick={confirmDeleteDep} className="px-6 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-xl font-medium shadow-sm transition-colors w-full">Ta bort</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="sticky top-0 z-40 bg-slate-100/95 backdrop-blur-sm px-4 md:px-8 pt-4 md:pt-6 pb-4 border-b border-slate-200 mb-6 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                                <Icon name="clipboard-check" className="text-blue-600 w-8 h-8" /> Daglig Kontroll - Överblick
                            </h1>
                            <p className="text-slate-500 mt-1">Status för kontroller hämtade från fordon och chaufförer.</p>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-3 bg-white p-2 rounded-xl shadow-sm border border-slate-200 w-full lg:w-auto">
                            <button onClick={() => setCurrentView('reports')} className="flex items-center gap-2 px-4 py-1.5 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg font-medium transition-all hover:bg-blue-100" title="Öppna statistik och rapporter">
                                <Icon name="bar-chart-3" className="w-4 h-4" /> <span className="hidden sm:inline">Rapporter</span>
                            </button>
                            <button onClick={() => setCurrentView('tv')} className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 text-white rounded-lg font-medium shadow-sm transition-all hover:bg-slate-900" title="Öppna kompakt vy anpassad för storskärm">
                                <Icon name="monitor" className="w-4 h-4" /> <span className="hidden sm:inline">TV-vy</span>
                            </button>
                            <div className="h-6 w-px bg-slate-200 mx-1"></div>
                            <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs text-slate-500">
                                <Icon name="truck" className="w-4 h-4" /> <span className="hidden xl:inline">Fordonsregister:</span> <span className="font-semibold">{lastVehicleUpdate || 'Laddar...'}</span>
                                <button onClick={fetchVehicles} disabled={loadingVehicles} className="ml-1 text-blue-600 hover:text-blue-800 transition-colors" title="Hämta senaste fordonslistan"><Icon name="refresh-cw" className={`w-3.5 h-3.5 ${loadingVehicles ? 'animate-spin' : ''}`} /></button>
                            </div>
                            <div className="h-6 w-px bg-slate-200 mx-1"></div>
                            <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg">
                                <Icon name="calendar" className="w-5 h-5 text-slate-500" />
                                <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="bg-transparent border-none text-slate-700 font-medium focus:outline-none focus:ring-0 cursor-pointer" />
                            </div>
                            <button onClick={() => fetchChecks(true)} disabled={refreshing} className={`flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium shadow-sm transition-all hover:bg-blue-700 focus:ring focus:ring-blue-300 disabled:opacity-70 disabled:cursor-not-allowed`} title="Uppdatera kontroller">
                                <Icon name="refresh-cw" className={`w-4 h-4 ${refreshing ? 'animate-spin' : ''}`} /> <span className="hidden sm:inline">Kontroller</span>
                            </button>
                        </div>
                    </div>

                    <div className="px-4 md:px-8 pb-8 flex flex-col md:flex-row gap-6 lg:gap-8">

                                {sortedDepartments.length === 0 && (
                                    <div className="text-center p-6 bg-white rounded-xl border border-slate-200 shadow-sm"><Icon name="inbox" className="w-12 h-12 mx-auto text-slate-300 mb-2" /><h3 className="font-semibold text-slate-600">Inga avdelningar</h3></div>
