        const normalizeRegNr = (str) => String(str || '').toUpperCase().replace(/\s+/g, '');

        // Funktion för att plocka bort dubbletter (Samma bil, förare, och inom 15 min)
        const removeDuplicates = (rows) => {
            const sorted = [...rows].sort((a, b) => new Date(b['Datum/tid']) - new Date(a['Datum/tid']));
            const unique = [];
            for (const row of sorted) {
                const regnr = String(row['Regnr Bil'] || '').trim().toUpperCase();
                const respondent = String(row['Respondent (read-only)'] || '').trim().toLowerCase();
                const timeStr = row['Datum/tid'];
                if(!timeStr) { unique.push(row); continue; }
                const time = new Date(timeStr).getTime();
                
                const isDuplicate = unique.some(u => {
                    const uRegnr = String(u['Regnr Bil'] || '').trim().toUpperCase();
                    const uRespondent = String(u['Respondent (read-only)'] || '').trim().toLowerCase();
                    const uTime = new Date(u['Datum/tid']).getTime();
                    
                    if (regnr === uRegnr && respondent === uRespondent) {
                        const diffMinutes = Math.abs(time - uTime) / (1000 * 60);
                        return diffMinutes < 15;
                    }
                    return false;
                });
                
                if (!isDuplicate) {
                    unique.push(row);
                }
            }
            return unique;
        };

        const analyzeCheckStatus = (check) => {
            if (!check) return 'MISSING';
            let hasWarning = false; // Gul (Egen åtgärd)
            let hasError = false;   // Röd (Rapporterat fel)
            let missingCritical = false; // Orange (Ofullständig)
            
            for (const key in check) {
                if (['Datum/tid', 'Regnr Bil', 'Regnr Släp', 'Respondent (read-only)', 'Skapat (read-only)', 'Senast ändrat (read-only)', 'Formulärsvar ID (read-only)'].includes(key)) continue;
                
                const answer = check[key];
                const isCritical = String(key).toLowerCase().match(/vätskor|olja|läckage|belysning|däck|mönsterdjup|lastsäkring|last/);

                if (!answer || String(answer).trim() === '') {
                    if (isCritical) missingCritical = true;
                    continue;
                }

                const firstChar = String(answer).trim().charAt(0);
                if (firstChar === '3') hasError = true;
                else if (firstChar === '2') hasWarning = true;
            }
            
            if (missingCritical) return 'INCOMPLETE';
            if (hasError) return 'ERROR';
            if (hasWarning) return 'WARNING';
            return 'OK';
        };

        const shortenQuestion = (question) => {
            const q = String(question).toLowerCase();
            if (q.includes('motorolja') || q.includes('kylarvätska') || q.includes('läckage')) return 'Vätskor & Läckage';
            if (q.includes('belysning')) return 'Belysning';
            if (q.includes('däck') || q.includes('mönsterdjup')) return 'Däck';
            if (q.includes('lastsäkring') || (q.includes('last') && q.includes('säkrad'))) return 'Lastsäkring';
            if (q.includes('rundgång') || q.includes('skador på kaross')) return 'Rundgång (Yttre skador)';
            if (q.includes('vindruta') || q.includes('speglar') || q.includes('sikt')) return 'Sikt & Rutor';
            if (q.includes('koppling') || q.includes('vändskiva') || q.includes('luftslangar')) return 'Koppling & Slangar';
            if (q.includes('tempererat') || q.includes('kyl')) return 'Tempererat gods';
            if (q.includes('tak') || q.includes('snö')) return 'Tak (Snö/Is)';
            if (q.includes('brandsläckare')) return 'Brandsläckare';
            if (q.includes('färdskrivare')) return 'Färdskrivare';
            if (q.includes('nödvändig adr-utrustning') || q.includes('om fordonet ska transportera farligt gods')) return 'ADR utrustning';
            if (q.includes('transportdokument') || q.includes('dokument') || q.includes('kort')) return 'Dokumentation';
            if (q.includes('säkerhetsbälte') || q.includes('lösa föremål')) return 'Säkerhet i hytt';
            if (q.includes('städat') || q.includes('skräp') || q.includes('ren')) return 'Städning hytt';
            if (q.includes('parkerad') || q.includes('uppställd')) return 'Parkering';
            if (q.includes('nycklar') || q.includes('nyckel')) return 'Nyckelhantering';
            return question.length > 35 ? question.substring(0, 35) + '...' : question;
        };

        const Icon = ({ name, className }) => {

            if (name === 'parking') return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width="24" height="24"><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="M9 17v-10h4a3 3 0 0 1 0 6h-4"></path></svg>;
            if (name === 'stethoscope') return <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 2v2"/><path d="M5 2v2"/><path d="M5 3H4a2 2 0 0 0-2 2v4a6 6 0 0 0 12 0V5a2 2 0 0 0-2-2h-1"/><path d="M8 15a6 6 0 0 0 12 0v-3"/><circle cx="20" cy="10" r="2"/></svg>;

                    lucide.createIcons({ root: tempDiv, attrs: { class: className || '', width: '24', height: '24' } });

            if (!svgContent) return <span className={`inline-block ${className}`} style={{ width: 24, height: 24 }}></span>;

        // ==========================================

        const App = () => {

            }, [currentView, tvSettings.refreshInterval, selectedDate]);

                    setSelectedDate(prevDate => prevDate !== todayStr ? todayStr : prevDate);

            const API_HEADERS = {
                "Accept": "application/json, text/plain, */*",
                "Authorization": "Bearer eyJhbGciOiJSUzI1NiIsImtpZCI6IjkzNzkwN0Y1MUIwNUFEMzdEMTVGQ0NGMTk0M0M1NzhGRjMwRERCMUNSUzI1NiIsIng1dCI6Imsza0g5UnNGclRmUlg4enhsRHhYal9NTjJ4dyIsInR5cCI6ImF0K2p3dCJ9.eyJpc3MiOiJodHRwczovL2xvZ2luLmNvbGl4c3lzdGVtcy5jb20iLCJuYmYiOjE3NzE4MjYyMjUsImlhdCI6MTc3MTgyNjIyNSwiZXhwIjoyMDg3Mzk1NzQ1LCJhdWQiOlsiQ29saXhBcHBsZXRzLkFQSSIsIkNvbGl4QXBwbGV0cy5QbHVnaW5zLkFQSSJdLCJzY29wZSI6WyJvcGVuaWQiLCJwcm9maWxlIiwiQ29saXhBcHBsZXRzLkFQSSIsIkNvbGl4QXBwbGV0cy5QbHVnaW5zLkFQSSJdLCJhbXIiOlsicHdkIl0sImNsaWVudF9pZCI6IjI0NDBlYWM1LTQxMjUtNDk1NS1iODEwLWJjODlhY2U0OWQyMyIsInN1YiI6IjI0MTAxOTE4LTllMzktNDBlOS05YzI4LWE4MzMwOWU2NWMzNyIsImF1dGhfdGltZSI6MTc3MDM2NzQ1OSwiaWRwIjoibG9jYWwiLCJpZCI6ImxhcnMuc2ltb25zc29uQHNtYWxhbmRzbG9naXN0aWsuc2UiLCJuYW1lIjoiTGFycyBTaW1vbnNzb24iLCJlbWFpbCI6ImxhcnMuc2ltb25zc29uQHNtYWxhbmRzbG9naXN0aWsuc2UiLCJ0b2tlbl9saWZldGltZSI6IjM2MDAwIiwiYXV0aF92aWFfYmFua2lkIjoidHJ1ZSIsInNpZCI6IjFBMEY0MzMxQzE1NDc5QTU5QUNDNEFDQzYzQkMyQ0Y4In0.J-8yrx15MrTBIZXKJo-pfadzAFeGzl5Ata2nP2zNGWjVWKfSSAehxT4Z7npVPl3ao7QcfyIo5LDwvhSKG-Hk_yHh_LIcv8vPSPXP0Ser6W-HJGjl6GV52BzbC9SF2Q-Vkdtyy4O8t-jL9fbZDw95xYcqG9wzOXgnmOa_tYJ-dWbBr5_FRSciWZziKA1tT76YVkz3V1dBPna3KTSgXZ5PInyNB9O8MBeJzTpIGsDMy95TxVZwWLpk33e-x9rU9_vmin4-3Q2BmSDa1QtWTbW6Da_yKXLMY_6Hk8PXWyWkwDjAgg2ynVgIXcrDW3Kcy5-tWi2INJYv2bEw2B5rHbnZVQ",

            const fetchVehicles = async () => {
                setLoadingVehicles(true);
                try {
                    if (!USE_MOCK_DATA) {
                        const vRes = await fetch(`https://colixpluginsformsapi.azurewebsites.net/api/v4/form/${FORMS.VEHICLES}/form-content/excel`, { method: 'GET', headers: API_HEADERS });
                        if (!vRes.ok) throw new Error("Kunde inte hämta fordon");
                        const vBuf = await vRes.arrayBuffer();
                        const vWb = XLSX.read(vBuf, { type: 'array' });
                        const vehicleData = XLSX.utils.sheet_to_json(vWb.Sheets[vWb.SheetNames[0]], { raw: false, defval: "" });

                        const rawTrucks = vehicleData.filter(v => String(v['Fordonstyp'] || '').trim().toLowerCase() === 'lastbil');

                            const type = String(v['Fordonstyp'] || '').trim().toLowerCase();
                            return type === 'släpvagn' || type === 'släp';
                        });
                        
                        const processedTrucks = rawTrucks.map(t => ({
                            ...t, Namn: String(t['Namn'] || '').trim().toUpperCase(),

            const fetchChecks = async (isRefresh = false) => {

                        const startDateObj = new Date(selectedDate);
                        startDateObj.setDate(startDateObj.getDate() - 3);

                        endDateObj.setDate(endDateObj.getDate() + 3); 

                        const formatIsoStr = (dateObj, isEnd) => {

                            const d = String(dateObj.getDate()).padStart(2, '0');
                            return isEnd ? `${y}-${m}-${d}T23:59:59` : `${y}-${m}-${d}T00:00:00`;
                        };

                        const startStr = formatIsoStr(startDateObj, false);
                        const endStr = formatIsoStr(endDateObj, true);

                        const cRes = await fetch(`https://colixpluginsformsapi.azurewebsites.net/api/v4/form/${FORMS.CHECKS}/form-content/excel?timePeriodFilter=${filterQuery}`, { method: 'GET', headers: API_HEADERS });

            const getPeriodDates = (period) => {
                const end = new Date(); const start = new Date();
                end.setHours(23, 59, 59, 999); start.setHours(0, 0, 0, 0);

                if (period === '7days') start.setDate(start.getDate() - 6);
                else if (period === 'thisMonth') start.setDate(1);
                else if (period === 'lastMonth') {
                    start.setMonth(start.getMonth() - 1); start.setDate(1);
                    end.setMonth(end.getMonth() - 1);
                    end.setDate(new Date(end.getFullYear(), end.getMonth() + 1, 0).getDate());
                    end.setHours(23, 59, 59, 999);
                } else if (period === 'ytd') start.setMonth(0, 1);
                
                const format = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
                return { startStr: format(start), endStr: format(end) };
            };

            const fetchReportData = async () => {
                setLoadingReport(true);
                try {
                    if (!USE_MOCK_DATA) {
                        let startStr, endStr;
                        if (reportPeriod === 'custom') {
                            if(!customReportStart || !customReportEnd) { setLoadingReport(false); return; }
                            startStr = `${customReportStart}T00:00:00`; endStr = `${customReportEnd}T23:59:59`;
                        } else {
                            const dates = getPeriodDates(reportPeriod);
                            startStr = dates.startStr; endStr = dates.endStr;
                        }
                        
                        const filterQuery = encodeURIComponent(JSON.stringify({ startDate: startStr, endDate: endStr }));

                        const cRes = await fetch(`https://colixpluginsformsapi.azurewebsites.net/api/v4/form/${FORMS.CHECKS}/form-content/excel?timePeriodFilter=${filterQuery}`, { method: 'GET', headers: API_HEADERS });
                        if (!cRes.ok) throw new Error("Kunde inte hämta rapportkontroller");
                        const cWb = XLSX.read(await cRes.arrayBuffer(), { type: 'array' });
                        const rawCData = XLSX.utils.sheet_to_json(cWb.Sheets[cWb.SheetNames[0]], { raw: false, defval: "" });

                        const pcRes = await fetch(`https://colixpluginsformsapi.azurewebsites.net/api/v4/form/${FORMS.POST_CHECKS}/form-content/excel?timePeriodFilter=${filterQuery}`, { method: 'GET', headers: API_HEADERS });
                        if (!pcRes.ok) throw new Error("Kunde inte hämta rapport efter-kontroller");
                        const pcWb = XLSX.read(await pcRes.arrayBuffer(), { type: 'array' });
                        const rawPcData = XLSX.utils.sheet_to_json(pcWb.Sheets[pcWb.SheetNames[0]], { raw: false, defval: "" });
                        
                        setReportChecks(removeDuplicates(rawCData));
                        setReportPostChecks(removeDuplicates(rawPcData));
                    }
                } catch (error) {
                    console.error("Fel vid hämtning av rapport:", error); 
                    showAlert("Fel vid hämtning", "Kunde inte hämta rapportdata från Colix.");
                } finally {
                    setLoadingReport(false);
                }
            };

            React.useEffect(() => {
                const initData = async () => { if (vehicles.length === 0) await fetchVehicles(); };
                initData();
            }, []);

            React.useEffect(() => {
                if (currentView === 'overview' || currentView === 'tv') fetchChecks();
            }, [selectedDate, currentView]);

            React.useEffect(() => {
                if (currentView === 'reports') {
                    if (reportPeriod !== 'custom' || (customReportStart && customReportEnd)) fetchReportData();
                }
            }, [currentView, reportPeriod, customReportStart, customReportEnd]);

            const findVehicleByAnyReference = (inputStr) => {
                if (!inputStr) return null;
                const normalized = normalizeRegNr(inputStr);
                return vehicles.find(v => normalizeRegNr(v['Namn']) === normalized || normalizeRegNr(v['Internreferens']) === normalized);
            };

            const findTrailerByAnyReference = (inputStr) => {
                if (!inputStr) return null;
                const normalized = normalizeRegNr(inputStr);
                return trailers.find(t => normalizeRegNr(t['Namn']) === normalized || normalizeRegNr(t['Internreferens']) === normalized);
            };

            const getChecksForDate = (vehicleName) => {
                const dateChecks = checks.filter(c => {
                    const checkDateStr = String(c['Datum/tid'] || '');
                    if (!checkDateStr.includes(selectedDate)) return false;
                    const matchedVehicle = findVehicleByAnyReference(String(c['Regnr Bil'] || ''));
                    return matchedVehicle && matchedVehicle['Namn'] === vehicleName;
                });
                if (dateChecks.length === 0) return { latest: null, all: [] };
                const sorted = dateChecks.sort((a, b) => new Date(b['Datum/tid']) - new Date(a['Datum/tid']));
                return { latest: sorted[0], all: sorted };
            };

            const getOnlyPostChecksForDate = (vehicleName) => {
                const dateChecks = postChecks.filter(pc => {
                     const checkDateStr = String(pc['Datum/tid'] || '');
                     if (!checkDateStr.includes(selectedDate)) return false;
                     
                     const matchedVehicle = findVehicleByAnyReference(String(pc['Regnr Bil'] || ''));
                     if (!matchedVehicle || matchedVehicle['Namn'] !== vehicleName) return false;

                     const pcTime = new Date(pc['Datum/tid']).getTime();
                     const pcDriver = String(pc['Respondent (read-only)'] || '').trim().toLowerCase();

                     const hasMatchingPreCheck = checks.some(pre => {
                         const preMatchedVehicle = findVehicleByAnyReference(String(pre['Regnr Bil'] || ''));
                         if (!preMatchedVehicle || preMatchedVehicle['Namn'] !== vehicleName) return false;
                         
                         if (String(pre['Respondent (read-only)'] || '').trim().toLowerCase() !== pcDriver) return false;
                         
                         const preTime = new Date(pre['Datum/tid']).getTime();
                         const diffHours = (pcTime - preTime) / (1000 * 60 * 60);
                         return diffHours >= 0 && diffHours <= 72;
                     });

                     return !hasMatchingPreCheck;
                });
                if (dateChecks.length === 0) return { latest: null, all: [] };
                const sorted = dateChecks.sort((a, b) => new Date(b['Datum/tid']) - new Date(a['Datum/tid']));
                return { latest: sorted[0], all: sorted };
            };

            const getPostCheckForPreCheck = (preCheck) => {
                if (!preCheck || !preCheck['Datum/tid']) return null;
                const matchedPreVehicle = findVehicleByAnyReference(String(preCheck['Regnr Bil'] || ''));
                if (!matchedPreVehicle) return null;
                const preVehicleName = matchedPreVehicle['Namn'];
                const preDriver = String(preCheck['Respondent (read-only)'] || '').trim().toLowerCase();
                const preTime = new Date(preCheck['Datum/tid']).getTime();

                const candidates = postChecks.filter(pc => {
                    const matchedPcVehicle = findVehicleByAnyReference(String(pc['Regnr Bil'] || ''));
                    if (!matchedPcVehicle || matchedPcVehicle['Namn'] !== preVehicleName) return false;
                    if (String(pc['Respondent (read-only)'] || '').trim().toLowerCase() !== preDriver) return false;
                    const pcTime = new Date(pc['Datum/tid']).getTime();
                    const diffHours = (pcTime - preTime) / (1000 * 60 * 60);
                    return diffHours >= 0 && diffHours <= 72;
                });

                if (candidates.length === 0) return null;
                candidates.sort((a, b) => new Date(a['Datum/tid']).getTime() - new Date(b['Datum/tid']).getTime());
                return candidates[0];
            };

            React.useEffect(() => {
                if (loading || currentView === 'reports') return; 
                const unknownMap = new Map();

                const processUnknown = (c, isPost) => {
                    const dateStr = String(c['Datum/tid'] || '');
                    if (!dateStr.includes(selectedDate)) return;
                    const rawInput = String(c['Regnr Bil'] || '').trim().toUpperCase();
                    if (!rawInput) return;

                    if (!findVehicleByAnyReference(rawInput)) {
                        if (!unknownMap.has(rawInput)) {
                            unknownMap.set(rawInput, {
                                Namn: rawInput, Avdelning: 'Okända fordon', isUnknown: true,
                                checks: { latest: null, all: [] }, postChecks: { latest: null, all: [] }
                            });
                        }
                        const v = unknownMap.get(rawInput);
                        if (isPost) {
                            v.postChecks.all.push(c);
                            v.postChecks.all.sort((a, b) => new Date(b['Datum/tid']) - new Date(a['Datum/tid']));
                            v.postChecks.latest = v.postChecks.all[0];
                        } else {
                            v.checks.all.push(c);
                            v.checks.all.sort((a, b) => new Date(b['Datum/tid']) - new Date(a['Datum/tid']));
                            v.checks.latest = v.checks.all[0];
                        }
                    }
                };

                checks.forEach(c => processUnknown(c, false));
                postChecks.forEach(pc => processUnknown(pc, true));
                setUnknownVehicles(Array.from(unknownMap.values()));
            }, [checks, postChecks, selectedDate, loading, vehicles, currentView]);

            const formatTrailerDisplay = (rawTrailerRegNr) => {
                if (!rawTrailerRegNr) return null;
                const trailerData = findTrailerByAnyReference(rawTrailerRegNr);
                const displayReg = trailerData ? trailerData['Namn'] : String(rawTrailerRegNr).trim().toUpperCase();
                if (trailerData && trailerData.Internreferens) return `${trailerData.Internreferens} (${displayReg})`;
                return displayReg;
            };

            // ==========================================
            // DRAG & DROP LOGIK
            // ==========================================
            const handleDepDragStart = (e, depName) => { setDraggedDep(depName); e.dataTransfer.effectAllowed = "move"; setTimeout(() => { if (e.target) e.target.classList.add('opacity-50'); }, 0); };
            const handleDepDragOver = (e, depName) => { e.preventDefault(); if (dragOverDep !== depName) setDragOverDep(depName); };
            const handleDepDragEnd = (e) => { if (e.target) e.target.classList.remove('opacity-50'); setDraggedDep(null); setDragOverDep(null); };
            const handleDepDrop = (e, targetDepName) => {
                e.preventDefault(); e.stopPropagation();
                if (!draggedDep || draggedDep === targetDepName) { setDragOverDep(null); return; }
                const currentList = [...sortedDepartments];
                const draggedIndex = currentList.indexOf(draggedDep);
                const targetIndex = currentList.indexOf(targetDepName);
                if (draggedIndex === -1 || targetIndex === -1) return;
                const newList = [...currentList];
                newList.splice(draggedIndex, 1); newList.splice(targetIndex, 0, draggedDep);
                setDepOrder(newList); setDragOverDep(null);
            };

            const handleDragStart = (e, vehicleName) => { dragOccurred.current = true; setDraggedItem(vehicleName); e.dataTransfer.effectAllowed = "move"; setTimeout(() => { if (e.target) e.target.classList.add('opacity-50'); }, 0); };
            const handleDragOver = (e, vehicleName) => { e.preventDefault(); if (dragOverItem !== vehicleName) setDragOverItem(vehicleName); };
            const handleDragEnd = (e) => { if (e.target) e.target.classList.remove('opacity-50'); setDraggedItem(null); setDragOverItem(null); setTimeout(() => { dragOccurred.current = false; }, 50); };
            const handleDrop = (e, targetVehicleName) => {
                e.preventDefault(); e.stopPropagation();
                if (!draggedItem || draggedItem === targetVehicleName) { setDragOverItem(null); return; }
                const currentList = sortedActiveVehicles.map(v => v['Namn']);
                const draggedIndex = currentList.indexOf(draggedItem);
                const targetIndex = currentList.indexOf(targetVehicleName);
                if (draggedIndex === -1 || targetIndex === -1) return;
                const newList = [...currentList];
                newList.splice(draggedIndex, 1); newList.splice(targetIndex, 0, draggedItem);
                setCustomOrder(Array.from(new Set([...newList, ...customOrder]))); setDragOverItem(null);
                
                if (sortMethod !== 'custom') setSortMethod('custom');
            };

            const toggleHideVehicle = (e, vehicleName) => {
                e.stopPropagation();
                setHiddenVehicles(prev => prev.includes(vehicleName) ? prev.filter(name => name !== vehicleName) : [...prev, vehicleName]);
            };

            const toggleTvDepartment = (dep) => {
                setTvSettings(prev => {
                    const deps = [...prev.departments];
                    if (deps.includes(dep)) return { ...prev, departments: deps.filter(d => d !== dep) };
                    return { ...prev, departments: [...deps, dep] };
                });
            };

            const handleCreateDep = () => {
                const name = newDepName.trim();
                if (!name) return;
                if (departments.includes(name) || customDeps.hasOwnProperty(name) || name === 'Okända fordon') { 
                    showAlert("Ogiltigt namn", "Namnet används redan av en annan flik eller avdelning."); 
                    return; 
                }
                setCustomDeps(prev => ({ ...prev, [name]: [] }));
                setNewDepName(''); setShowCreateDepModal(false); setActiveTab(name);
            };

            const confirmDeleteDep = () => {
                setCustomDeps(prev => { const updated = { ...prev }; delete updated[depToDelete]; return updated; });
                setTvSettings(prev => ({ ...prev, departments: prev.departments.filter(d => d !== depToDelete) }));
                if (activeTab === depToDelete && departments.length > 0) setActiveTab(departments[0]);
                setDepToDelete(null);
            };

            const toggleVehicleInCustomDep = (vehicleName, depName) => {
                setCustomDeps(prev => {
                    const currentList = prev[depName] || [];
                    if (currentList.includes(vehicleName)) return { ...prev, [depName]: currentList.filter(v => v !== vehicleName) };
                    else return { ...prev, [depName]: [...currentList, vehicleName] };
                });
            };

            const sortedDepartments = React.useMemo(() => {
                let allBaseDeps = [...departments, ...Object.keys(customDeps)];
                if (depOrder.length > 0) {
                    allBaseDeps.sort((a, b) => {
                        const idxA = depOrder.indexOf(a); const idxB = depOrder.indexOf(b);
                        if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                        if (idxA !== -1) return -1; if (idxB !== -1) return 1;
                        return 0;
                    });
                }
                if (unknownVehicles.length > 0) allBaseDeps.push('Okända fordon');
                return allBaseDeps;
            }, [departments, customDeps, depOrder, unknownVehicles]);

            const isUnknownTab = activeTab === 'Okända fordon';
            const isCustomTab = customDeps.hasOwnProperty(activeTab);
            
            const currentTabVehicles = React.useMemo(() => {
                if (isUnknownTab) return unknownVehicles;
                if (isCustomTab) {
                    const validRegs = customDeps[activeTab];
                    return vehicles.filter(v => validRegs.includes(v['Namn']));
                }
                return vehicles.filter(v => v.Avdelning === activeTab);
            }, [activeTab, isUnknownTab, isCustomTab, unknownVehicles, vehicles, customDeps]);

            const activeVehicles = currentTabVehicles.filter(v => !hiddenVehicles.includes(v['Namn']));
            const inactiveVehicles = currentTabVehicles.filter(v => hiddenVehicles.includes(v['Namn']));

            const sortedActiveVehicles = React.useMemo(() => {
                if (isUnknownTab) return activeVehicles; 
                let vehiclesToSort = [...activeVehicles];
                
                if (sortMethod === 'internref') {
                    vehiclesToSort.sort((a, b) => {
                        const refA = String(a.Internreferens || a['Namn']).toLowerCase();
                        const refB = String(b.Internreferens || b['Namn']).toLowerCase();
                        return refA.localeCompare(refB, 'sv');
                    });
                } else if (sortMethod === 'regnr') {
                    vehiclesToSort.sort((a, b) => {
                        const nameA = String(a['Namn']).toLowerCase();
                        const nameB = String(b['Namn']).toLowerCase();
                        return nameA.localeCompare(nameB, 'sv');
                    });
                } else {
                    if (customOrder.length > 0) {
                        vehiclesToSort.sort((a, b) => {
                            const idxA = customOrder.indexOf(a['Namn']); const idxB = customOrder.indexOf(b['Namn']);
                            if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                            if (idxA !== -1) return -1; if (idxB !== -1) return 1;
                            return 0;
                        });
                    }
                }
                return vehiclesToSort;
            }, [activeVehicles, customOrder, isUnknownTab, sortMethod]);

            const handleOpenReport = (e, vehicle, rawTrailer) => {
                e.stopPropagation();
                const truckId = vehicle['Formulärsvar ID (read-only)'];
                
                if (!truckId) {
                    showAlert("ID Saknas", "Detta fordon saknar ett giltigt ID i registret och felrapporter kan inte visas.");
                    return;
                }

                let trailerObj = null;
                if (rawTrailer) {
                    trailerObj = findTrailerByAnyReference(rawTrailer);
                }

                setReportModalData({
                    truck: vehicle,
                    truckId: truckId,
                    trailerReg: rawTrailer,
                    trailerObj: trailerObj
                });
            };

            // ==========================================
            // KORT-KOMPONENTER (Överblick & TV)
            // ==========================================
            const renderVehicleCard = (vehicle, isHidden = false) => {
                let checkData, currentCheck, status, postCheck, postStatus;

                if (vehicle.isUnknown) {
                    checkData = vehicle.checks;
                    currentCheck = checkData.latest;
                    status = analyzeCheckStatus(currentCheck);
                    postCheck = vehicle.postChecks.latest;
                    postStatus = analyzeCheckStatus(postCheck);
                } else {
                    checkData = getChecksForDate(vehicle['Namn']);
                    currentCheck = checkData.latest;
                    status = analyzeCheckStatus(currentCheck);
                    postCheck = getPostCheckForPreCheck(currentCheck);
                    postStatus = postCheck ? analyzeCheckStatus(postCheck) : null;

                    if (!currentCheck) {
                        const orphanedPostData = getOnlyPostChecksForDate(vehicle['Namn']);
                        if (orphanedPostData.latest) {
                            postCheck = orphanedPostData.latest;
                            postStatus = analyzeCheckStatus(postCheck);
                            checkData = { latest: null, all: [], orphanedPost: orphanedPostData }; 
                        }
                    }
                }
                
                const rawTrailer = currentCheck ? currentCheck['Regnr Släp'] : (postCheck ? postCheck['Regnr Släp'] : null);
                const displayTrailer = formatTrailerDisplay(rawTrailer);
                
                let cardTheme = "bg-white border-slate-200 hover:border-slate-400";
                let iconName = "clock";
                let statusText = "Ej utförd detta datum";
                let parkingColor = "text-slate-300 opacity-60"; 

                if (currentCheck) {
                    if (status === 'OK') { cardTheme = "bg-green-50 border-green-200 hover:border-green-400"; iconName = "circle-check"; statusText = "Kontrollerad (OK)"; } 
                    else if (status === 'WARNING') { cardTheme = "bg-yellow-50 border-yellow-300 hover:border-yellow-500"; iconName = "triangle-alert"; statusText = "Egen åtgärd"; } 
                    else if (status === 'ERROR') { cardTheme = "bg-red-50 border-red-300 hover:border-red-500"; iconName = "circle-x"; statusText = "Rapporterat fel"; }
                    else if (status === 'INCOMPLETE') { cardTheme = "bg-orange-50 border-orange-300 hover:border-orange-500"; iconName = "file-question"; statusText = "Ofullständig"; }
                } else if (postCheck) {
                    cardTheme = "bg-slate-50 border-red-300 hover:border-red-500";
                    iconName = "alert-triangle";
                    statusText = "Saknar före-kontroll";
                    status = "ERROR"; 
                }

                if (postCheck) {
                    if (postStatus === 'OK') parkingColor = "text-green-500";
                    if (postStatus === 'WARNING') parkingColor = "text-yellow-500";
                    if (postStatus === 'ERROR') parkingColor = "text-red-500";
                    if (postStatus === 'INCOMPLETE') parkingColor = "text-orange-500";
                }

                const displayCheck = currentCheck || postCheck; 
                const isDragOver = dragOverItem === vehicle['Namn'];
                const isDraggable = !isHidden && !vehicle.isUnknown && sortMethod === 'custom';
                
                let combinedClasses = `${cardTheme} ${isHidden ? "grayscale opacity-60 hover:opacity-100 hover:grayscale-0" : ""} ${isDragOver ? "border-blue-500 ring-2 ring-blue-300 scale-105 shadow-xl z-20" : ""} ${isDraggable ? "cursor-grab active:cursor-grabbing" : "cursor-pointer"}`;
                if (vehicle.isUnknown) combinedClasses += " border-dashed border-2 border-indigo-300"; 

                const hasCustomDeps = Object.keys(customDeps).length > 0;

                return (
                    <div 
                        key={vehicle['Namn']}
                        draggable={isDraggable}
                        onDragStart={isDraggable ? (e) => handleDragStart(e, vehicle['Namn']) : undefined}
                        onDragEnd={isDraggable ? handleDragEnd : undefined}
                        onDragOver={isDraggable ? (e) => handleDragOver(e, vehicle['Namn']) : undefined}
                        onDrop={isDraggable ? (e) => handleDrop(e, vehicle['Namn']) : undefined}
                        onClick={() => {
                            if (dragOccurred.current) return;
                            setSelectedVehicle({ vehicle, checkData, status, orphanedPost: checkData?.orphanedPost });
                            setCurrentCheckIndex(0);
                        }}
                        className={`relative rounded-xl border p-5 shadow-sm transition-all duration-200 hover:shadow-md group flex flex-col justify-between h-full ${combinedClasses}`}
                    >
                        <div className="absolute top-2 right-2 flex items-center gap-1 z-10">
                            
                            {!vehicle.isUnknown && (
                                <div className="relative">
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); setVehicleMenuOpen(vehicleMenuOpen === vehicle['Namn'] ? null : vehicle['Namn']); }}
                                        className="p-2 rounded-lg text-slate-400 bg-white/80 hover:text-blue-600 hover:bg-blue-100 opacity-0 group-hover:opacity-100 focus:opacity-100 transition-colors"
                                        title="Lägg till i egen avdelning"
                                    >
                                        <Icon name="folder-plus" className="w-4 h-4" />
                                    </button>
                                    
                                    {vehicleMenuOpen === vehicle['Namn'] && (
                                        <div className="absolute right-0 top-full mt-1 w-48 bg-white border border-slate-200 shadow-xl rounded-xl z-30 p-2 animate-in fade-in slide-in-from-top-2" onClick={e=>e.stopPropagation()}>
                                            <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 px-1">Egna avdelningar</h4>
                                            {hasCustomDeps ? (
                                                Object.keys(customDeps).map(dep => (
                                                    <label key={dep} className="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={customDeps[dep].includes(vehicle['Namn'])} 
                                                            onChange={() => toggleVehicleInCustomDep(vehicle['Namn'], dep)} 
                                                            className="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500"
                                                        />
                                                        <span className="text-sm text-slate-700 font-medium truncate">{dep}</span>
                                                    </label>
                                                ))
                                            ) : (
                                                <div className="text-xs text-slate-400 px-1 pb-1">Inga egna avdelningar.</div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                            <button 
                                onClick={(e) => toggleHideVehicle(e, vehicle['Namn'])}
                                className={`p-2 rounded-lg transition-colors 
                                    ${isHidden ? 'text-blue-600 bg-blue-100 hover:bg-blue-200' : 'text-slate-400 bg-white/80 hover:text-slate-700 hover:bg-slate-200 opacity-0 group-hover:opacity-100 focus:opacity-100'}
                                `}
                                title={isHidden ? "Visa fordon" : "Dölj fordon"}
                            >
                                <Icon name={isHidden ? "eye" : "eye-off"} className="w-4 h-4" />
                            </button>
                        </div>

                        <div>
                            <div className="flex justify-between items-start mb-4 pr-16 pl-1">
                                <div className="flex items-start gap-3">
                                    <div className="mt-1">
                                        <Icon name={vehicle.isUnknown ? "help-circle" : "truck"} className={vehicle.isUnknown ? "text-indigo-500" : "text-slate-700"} />
                                    </div>
                                    <div>
                                        {vehicle.Internreferens && (
                                            <div className="text-lg font-extrabold text-slate-800 tracking-tight mb-1">
                                                {vehicle.Internreferens}
                                            </div>
                                        )}
                                        <h3 className={`${vehicle.Internreferens ? 'text-sm text-slate-500' : 'text-xl text-slate-800'} font-bold tracking-tight leading-none`}>{vehicle['Namn']}</h3>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <div className={`shrink-0 ${status === 'OK' ? 'text-green-600' : ''} ${status === 'WARNING' ? 'text-yellow-600' : ''} ${status === 'ERROR' ? 'text-red-600' : ''} ${status === 'INCOMPLETE' ? 'text-orange-500' : ''} ${status === 'MISSING' ? 'text-slate-400' : ''}`}>
                                        <Icon name={iconName} className={`w-6 h-6 ${!currentCheck && postCheck ? 'animate-pulse' : ''}`} />
                                    </div>
                                    {(currentCheck || postCheck) && (
                                        <div title={postCheck ? "Parkerad: Efter-kontroll inlämnad" : "Pass pågår: Inväntar Efter-kontroll"}>
                                            <Icon name="parking" className={`w-6 h-6 ${parkingColor}`} />
                                        </div>
                                    )}
                                </div>
                            </div>
                            
                            <div className="space-y-2 text-sm mt-3 pl-1">
                                {displayCheck ? (
                                    <>
                                        <div className="flex items-center gap-2 text-slate-600">
                                            <Icon name="user" className="w-4 h-4 shrink-0" />
                                            <span className="truncate font-medium">{displayCheck['Respondent (read-only)'] || 'Okänd'}</span>
                                        </div>
                                        <div className="flex items-center justify-between text-slate-600">
                                            <div className="flex items-center gap-2">
                                                <Icon name="clock-4" className="w-4 h-4" />
                                                <span>
                                                    {displayCheck['Datum/tid'] ? displayCheck['Datum/tid'].split(' ')[1] : ''}
                                                </span>
                                            </div>
                                            {checkData && checkData.all && checkData.all.length > 1 && (
                                                <span className="bg-blue-100 text-blue-700 font-bold text-[10px] px-2 py-0.5 rounded-full uppercase tracking-wider">
                                                    {checkData.all.length} st
                                                </span>
                                            )}
                                        </div>
                                        {displayTrailer && (
                                            <div className="flex items-center gap-2 text-slate-600 mt-2">
                                                <Icon name="trailer" className="w-4 h-4" />
                                                <span className="truncate text-xs font-semibold bg-slate-100 border border-slate-200 px-2 py-0.5 rounded text-slate-700">{displayTrailer}</span>
                                            </div>
                                        )}
                                    </>
                                ) : (
                                    <div className="text-slate-400 italic pt-2">
                                        Inväntar tillsyn...
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className={`mt-4 pt-3 border-t text-xs font-semibold tracking-wider leading-tight pl-1 flex items-center justify-between
                            ${status === 'OK' ? 'border-green-200' : ''}
                            ${status === 'WARNING' ? 'border-yellow-200' : ''}
                            ${status === 'ERROR' ? 'border-red-200' : ''}
                            ${status === 'INCOMPLETE' ? 'border-orange-200' : ''}
                            ${status === 'MISSING' ? 'border-slate-100' : ''}
                        `}>
                            <div className={`uppercase ${status === 'OK' ? 'text-green-700' : ''} ${status === 'WARNING' ? 'text-yellow-700' : ''} ${status === 'ERROR' ? 'text-red-700' : ''} ${status === 'INCOMPLETE' ? 'text-orange-700' : ''} ${status === 'MISSING' ? 'text-slate-500' : ''}`}>
                                {statusText}
                            </div>
                            
                            {!vehicle.isUnknown && (
                                <button 
                                    onClick={(e) => handleOpenReport(e, vehicle, rawTrailer)}
                                    className={`p-1.5 -mr-1.5 rounded-lg transition-colors focus:outline-none focus:ring-2
                                        ${status === 'OK' ? 'text-green-600 hover:bg-green-100 hover:text-green-800' : ''}
                                        ${status === 'WARNING' ? 'text-yellow-600 hover:bg-yellow-100 hover:text-yellow-800' : ''}
                                        ${status === 'ERROR' ? 'text-red-600 hover:bg-red-100 hover:text-red-800' : ''}
                                        ${status === 'INCOMPLETE' ? 'text-orange-600 hover:bg-orange-100 hover:text-orange-800' : ''}
                                        ${status === 'MISSING' ? 'text-slate-400 hover:bg-slate-200 hover:text-slate-600' : ''}
                                    `}
                                    title="Visa felrapporter för valt ekipage"
                                >
                                    <Icon name="stethoscope" className="w-5 h-5" />
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            const renderTVVehicleCard = (vehicle) => {
                let checkData, currentCheck, status, postCheck, postStatus;

                if (vehicle.isUnknown) {
                    checkData = vehicle.checks;
                    currentCheck = checkData.latest;
                    status = analyzeCheckStatus(currentCheck);
                    postCheck = vehicle.postChecks.latest;
                    postStatus = analyzeCheckStatus(postCheck);
                } else {
                    checkData = getChecksForDate(vehicle['Namn']);
                    currentCheck = checkData.latest;
                    status = analyzeCheckStatus(currentCheck);
                    postCheck = getPostCheckForPreCheck(currentCheck);
                    postStatus = postCheck ? analyzeCheckStatus(postCheck) : null;

                    if (!currentCheck) {
                        const orphanedPostData = getOnlyPostChecksForDate(vehicle['Namn']);
                        if (orphanedPostData.latest) {
                            postCheck = orphanedPostData.latest;
                            postStatus = analyzeCheckStatus(postCheck);
                        }
                    }
                }
                
                const rawTrailer = currentCheck ? currentCheck['Regnr Släp'] : (postCheck ? postCheck['Regnr Släp'] : null);
                const displayTrailer = formatTrailerDisplay(rawTrailer);
                
                let cardTheme = "bg-white border-slate-200 opacity-95";
                let iconName = "clock";
                let statusText = "Ej utförd idag";
                let parkingColor = "text-slate-300 opacity-60"; 

                if (currentCheck) {
                    if (status === 'OK') { cardTheme = "bg-green-50 border-green-300"; iconName = "circle-check"; statusText = "Kontrollerad (OK)"; } 
                    else if (status === 'WARNING') { cardTheme = "bg-yellow-50 border-yellow-400"; iconName = "triangle-alert"; statusText = "Egen åtgärd"; } 
                    else if (status === 'ERROR') { cardTheme = "bg-red-50 border-red-400"; iconName = "circle-x"; statusText = "Rapporterat fel"; }
                    else if (status === 'INCOMPLETE') { cardTheme = "bg-orange-50 border-orange-300"; iconName = "file-question"; statusText = "Ofullständig"; }
                } else if (postCheck) {
                    cardTheme = "bg-slate-50 border-red-400";
                    iconName = "alert-triangle";
                    statusText = "Saknar före-kontroll";
                    status = "ERROR";
                }

                if (postCheck) {
                    if (postStatus === 'OK') parkingColor = "text-green-500";
                    if (postStatus === 'WARNING') parkingColor = "text-yellow-500";
                    if (postStatus === 'ERROR') parkingColor = "text-red-500";
                    if (postStatus === 'INCOMPLETE') parkingColor = "text-orange-500";
                }

                const displayCheck = currentCheck || postCheck;

                return (
                    <div key={vehicle['Namn']} className={`rounded-xl border p-3 shadow-sm flex flex-col justify-between h-full ${cardTheme} ${vehicle.isUnknown ? 'border-dashed border-2 border-indigo-300' : ''}`}>
                        <div>
                            <div className="flex justify-between items-start mb-2">
                                <div className="flex items-start gap-2 overflow-hidden min-w-0">
                                    <div className="mt-0.5 shrink-0">
                                        <Icon name={vehicle.isUnknown ? "help-circle" : "truck"} className={vehicle.isUnknown ? "text-indigo-500 w-4 h-4" : "text-slate-700 w-4 h-4"} />
                                    </div>
                                    <div className="min-w-0 flex-1">
                                        {vehicle.Internreferens && (
                                            <div className="text-sm font-extrabold text-slate-800 tracking-tight leading-none mb-0.5 truncate" title={vehicle.Internreferens}>
                                                {vehicle.Internreferens}
                                            </div>
                                        )}
                                        <div className={`${vehicle.Internreferens ? 'text-[10px] text-slate-500' : 'text-sm font-bold text-slate-800'} tracking-tight leading-none truncate`} title={vehicle['Namn']}>
                                            {vehicle['Namn']}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-1.5 shrink-0 ml-1.5">
                                    <div className={`shrink-0 ${status === 'OK' ? 'text-green-600' : ''} ${status === 'WARNING' ? 'text-yellow-600' : ''} ${status === 'ERROR' ? 'text-red-600' : ''} ${status === 'INCOMPLETE' ? 'text-orange-500' : ''} ${status === 'MISSING' ? 'text-slate-400' : ''}`}>
                                        <Icon name={iconName} className={`w-5 h-5 ${!currentCheck && postCheck ? 'animate-pulse' : ''}`} />
                                    </div>
                                    {(currentCheck || postCheck) && (
                                        <Icon name="parking" className={`w-5 h-5 ${parkingColor}`} />
                                    )}
                                </div>
                            </div>
                            
                            <div className="space-y-1.5 text-[11px] mt-2 pl-0.5">
                                {displayCheck ? (
                                    <>
                                        <div className="flex items-center gap-1.5 text-slate-600">
                                            <Icon name="user" className="w-3 h-3 shrink-0" />
                                            <span className="truncate font-medium">{displayCheck['Respondent (read-only)'] || 'Okänd'}</span>
                                        </div>
                                        <div className="flex items-center justify-between text-slate-600">
                                            <div className="flex items-center gap-1.5">
                                                <Icon name="clock-4" className="w-3 h-3 shrink-0" />
                                                <span className="font-medium">
                                                    {displayCheck['Datum/tid'] ? displayCheck['Datum/tid'].split(' ')[1] : ''}
                                                </span>
                                            </div>
                                        </div>
                                        {displayTrailer && (
                                            <div className="flex items-center gap-1.5 text-slate-600 mt-1">
                                                <Icon name="trailer" className="w-3 h-3 shrink-0" />
                                                <span className="truncate text-[9px] font-bold bg-slate-100/80 border border-slate-200 px-1.5 py-0.5 rounded text-slate-700">{displayTrailer}</span>
                                            </div>
                                        )}
                                    </>
                                ) : (
                                    <div className="text-slate-400 italic pt-0.5 pb-2">
                                        Inväntar tillsyn...
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className={`mt-2.5 pt-1.5 border-t text-[9px] font-bold uppercase tracking-wider leading-tight pl-0.5
                            ${status === 'OK' ? 'border-green-300 text-green-700' : ''}
                            ${status === 'WARNING' ? 'border-yellow-300 text-yellow-700' : ''}
                            ${status === 'ERROR' ? 'border-red-300 text-red-700' : ''}
                            ${status === 'INCOMPLETE' ? 'border-orange-300 text-orange-700' : ''}
                            ${status === 'MISSING' ? 'border-slate-100 text-slate-500' : ''}
                        `}>
                            {statusText}
                        </div>
                    </div>
                );
            };

            // Beräkna alla TV-sidor (slides) dynamiskt
            const tvSlides = React.useMemo(() => {
                const slides = [];
                const tvDeps = tvSettings.departments.length > 0 ? sortedDepartments.filter(d => tvSettings.departments.includes(d)) : sortedDepartments;

                tvDeps.forEach(dep => {
                    const isCustom = customDeps.hasOwnProperty(dep);
                    const isUnknown = dep === 'Okända fordon';
                    
                    let depVehicles = [];
                    if (isUnknown) depVehicles = unknownVehicles;
                    else if (isCustom) depVehicles = vehicles.filter(v => customDeps[dep].includes(v['Namn']));
                    else depVehicles = vehicles.filter(v => v.Avdelning === dep && !hiddenVehicles.includes(v['Namn']));
                    
                    let sortedDepVehicles = [...depVehicles];
                    if (sortMethod === 'internref') {
                        sortedDepVehicles.sort((a, b) => String(a.Internreferens || a['Namn']).toLowerCase().localeCompare(String(b.Internreferens || b['Namn']).toLowerCase(), 'sv'));
                    } else if (sortMethod === 'regnr') {
                        sortedDepVehicles.sort((a, b) => String(a['Namn']).toLowerCase().localeCompare(String(b['Namn']).toLowerCase(), 'sv'));
                    } else {
                        if (customOrder.length > 0 && !isUnknown) {
                            sortedDepVehicles.sort((a, b) => {
                                const idxA = customOrder.indexOf(a['Namn']);
                                const idxB = customOrder.indexOf(b['Namn']);
                                if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                                if (idxA !== -1) return -1; if (idxB !== -1) return 1;
                                return 0;
                            });
                        }
                    }

                    if (sortedDepVehicles.length === 0) return;

                    const max = tvSettings.maxPerPage || 24;
                    const totalPages = Math.ceil(sortedDepVehicles.length / max);

                    for (let i = 0; i < totalPages; i++) {
                        slides.push({
                            id: `${dep}-page-${i+1}`,
                            depName: dep,
                            isCustom,
                            isUnknown,
                            pageIndex: i + 1,
                            totalPages,
                            vehicles: sortedDepVehicles.slice(i * max, (i + 1) * max)
                        });
                    }
                });
                return slides;
            }, [tvSettings, sortedDepartments, customDeps, unknownVehicles, vehicles, hiddenVehicles, customOrder, sortMethod]);

            // Återställ slide om avdelningar ändras och nuvarande index blir ogiltigt
            React.useEffect(() => {
                if (currentSlideIndex >= tvSlides.length && tvSlides.length > 0) {
                    setCurrentSlideIndex(0);
                }
            }, [tvSlides.length, currentSlideIndex]);

            // Timer för TV-karusell
            React.useEffect(() => {
                if (currentView !== 'tv' || tvSlides.length <= 1 || !tvSettings.carouselSpeed || tvSettings.carouselSpeed === 0) return;
                
                const timer = setInterval(() => {
                    setCurrentSlideIndex(prev => (prev + 1) % tvSlides.length);
                }, tvSettings.carouselSpeed * 1000);

                return () => clearInterval(timer);
            }, [currentView, tvSlides.length, tvSettings.carouselSpeed]);

            const nextTvSlide = () => setCurrentSlideIndex(prev => (prev + 1) % tvSlides.length);
            const prevTvSlide = () => setCurrentSlideIndex(prev => (prev - 1 + tvSlides.length) % tvSlides.length);

            // ==========================================
            // RAPPORTER / STATISTIK VY
            // ==========================================
            const renderReports = () => {
                const baseActiveVehicles = vehicles.filter(v => {
                    if(hiddenVehicles.includes(v['Namn'])) return false;
                    if(reportDepartments.length === 0) return true;
                    return reportDepartments.includes(v.Avdelning);
                });
                const totalActiveVehiclesCount = baseActiveVehicles.length;

                const isRelevantForDept = (regnrStr) => {
                    if (reportDepartments.length === 0) return true;
                    const vObj = findVehicleByAnyReference(regnrStr);
                    if (vObj && reportDepartments.includes(vObj.Avdelning)) return true;
                    return false;
                };

                const filteredPre = reportChecks.filter(c => isRelevantForDept(String(c['Regnr Bil'] || '')));
                const filteredPost = reportPostChecks.filter(c => isRelevantForDept(String(c['Regnr Bil'] || '')));

                const totalPre = filteredPre.length;
                const totalPost = filteredPost.length;
                const totalChecks = totalPre + totalPost;

                let warningCount = 0; 
                let errorCount = 0;   
                let incompleteCount = 0; 

                const isComplete = (c) => analyzeCheckStatus(c) !== 'INCOMPLETE';

                const uniqueCheckedSet = new Set([
                    ...filteredPre.filter(isComplete).map(c => normalizeRegNr(c['Regnr Bil'])),
                    ...filteredPost.filter(isComplete).map(c => normalizeRegNr(c['Regnr Bil']))
                ]);
                const uniqueVehiclesCount = uniqueCheckedSet.size;

                const compliancePct = totalActiveVehiclesCount > 0 ? Math.round((uniqueVehiclesCount / totalActiveVehiclesCount) * 100) : 0;

                const analyzeDefects = () => {
                    const defects = {}; 
                    const processCheck = (check) => {
                        const st = analyzeCheckStatus(check);
                        if (st === 'WARNING') warningCount++;
                        if (st === 'ERROR') errorCount++;
                        if (st === 'INCOMPLETE') incompleteCount++;

                        for (const key in check) {
                            if (['Datum/tid', 'Regnr Bil', 'Regnr Släp', 'Respondent (read-only)', 'Skapat (read-only)', 'Senast ändrat (read-only)', 'Formulärsvar ID (read-only)'].includes(key)) continue;
                            const ans = String(check[key]).trim();
                            if (ans) {
                                const f = ans.charAt(0);
                                if (f === '2' || f === '3') {
                                    const short = shortenQuestion(key);
                                    if (!defects[short]) defects[short] = { warning: 0, error: 0 };
                                    if (f === '2') defects[short].warning++;
                                    if (f === '3') defects[short].error++;
                                }
                            }
                        }
                    };
                    filteredPre.forEach(processCheck);
                    filteredPost.forEach(processCheck);
                    
                    return Object.entries(defects)
                        .map(([name, counts]) => ({ name, ...counts, total: counts.warning + counts.error }))
                        .sort((a, b) => b.total - a.total);
                };

                const topDefects = analyzeDefects();
                const errorRatio = totalChecks > 0 ? Math.round((errorCount / totalChecks) * 100) : 0;
                const warningRatio = totalChecks > 0 ? Math.round((warningCount / totalChecks) * 100) : 0;

                const healthIndex = Math.round(compliancePct * (1 - (errorCount / Math.max(1, totalChecks))));

                const analyzeTrend = () => {
                    const days = {};
                    const process = (c, type) => {
                        const dateStr = String(c['Datum/tid'] || '').split(' ')[0];
                        if(!dateStr || dateStr.length < 10) return;
                        if(!days[dateStr]) days[dateStr] = { pre: 0, post: 0 };
                        days[dateStr][type]++;
                    };
                    filteredPre.forEach(c => process(c, 'pre'));
                    filteredPost.forEach(c => process(c, 'post'));
                    
                    return Object.entries(days)
                        .map(([date, counts]) => ({ date, ...counts }))
                        .sort((a, b) => a.date.localeCompare(b.date)); 
                };
                const trendData = analyzeTrend();
                const maxTrendVal = Math.max(...trendData.map(d => Math.max(d.pre, d.post)), 1);

                const buildSvgPoints = (type) => {
                    if (trendData.length === 0) return "";
                    const width = 960; const offsetX = 40;
                    const xStep = width / Math.max(1, trendData.length - 1);
                    return trendData.map((d, i) => {
                        const x = offsetX + i * xStep;
                        const y = 150 - ((d[type] / maxTrendVal) * 100);
                        return `${x},${y}`;
                    }).join(" ");
                };
                const prePoints = buildSvgPoints('pre');
                const postPoints = buildSvgPoints('post');

                const analyzeTimeOfDay = () => {
                    const hours = Array.from({length: 24}, (_, i) => ({ hour: i, pre: 0, post: 0 }));
                    const process = (c, type) => {
                        const timeStr = String(c['Datum/tid'] || '').split(' ')[1];
                        if(!timeStr) return;
                        const h = parseInt(timeStr.split(':')[0], 10);
                        if(!isNaN(h) && h >= 0 && h < 24) hours[h][type]++;
                    };
                    filteredPre.forEach(c => process(c, 'pre'));
                    filteredPost.forEach(c => process(c, 'post'));
                    return hours;
                };
                const timeData = analyzeTimeOfDay();
                const maxTimeVal = Math.max(...timeData.map(d => Math.max(d.pre, d.post)), 1);

                const analyzeErrorVehicles = () => {
                    const vehi = {}; 
                    const process = (c) => {
                        const reg = normalizeRegNr(c['Regnr Bil'] || 'Okänd');
                        const st = analyzeCheckStatus(c);
                        if(!vehi[reg]) {
                            const vObj = findVehicleByAnyReference(reg);
                            vehi[reg] = { display: vObj && vObj.Internreferens ? `${vObj.Internreferens} (${reg})` : reg, errors: 0 };
                        }
                        if(st === 'ERROR') vehi[reg].errors++;
                    };
                    filteredPre.forEach(process); filteredPost.forEach(process);
                    return Object.entries(vehi).map(([reg, data]) => ({ reg, ...data })).filter(v => v.errors > 0).sort((a, b) => b.errors - a.errors);
                };
                const topErrorVehicles = analyzeErrorVehicles().slice(0, 10);

                const unusedVehicles = baseActiveVehicles.filter(v => !uniqueCheckedSet.has(normalizeRegNr(v['Namn'])));

                const analyzeDrivers = () => {
                    const drivers = {};
                    const process = (c) => {
                        let name = String(c['Respondent (read-only)'] || 'Okänd').trim();
                        if(name.length > 0) name = name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
                        const st = analyzeCheckStatus(c);
                        if(!drivers[name]) drivers[name] = { total: 0, warnings: 0 };
                        drivers[name].total++;
                        if(st === 'WARNING') drivers[name].warnings++;
                    };
                    filteredPre.forEach(process); filteredPost.forEach(process);
                    return Object.entries(drivers).map(([name, counts]) => ({ name, ...counts }));
                };
                const driverStats = analyzeDrivers();
                const topDiligentDrivers = [...driverStats].sort((a, b) => b.total - a.total).slice(0, 10);
                const topProactiveDrivers = [...driverStats].sort((a, b) => b.warnings - a.warnings).slice(0, 10);

                const detectTickAndGo = () => {
                    const vStats = {}; 
                    const process = (c) => {
                        const reg = normalizeRegNr(c['Regnr Bil'] || 'Okänd');
                        let driver = String(c['Respondent (read-only)'] || 'Okänd').trim();
                        if(driver.length > 0) driver = driver.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
                        const st = analyzeCheckStatus(c);
                        const hasDefect = (st === 'WARNING' || st === 'ERROR') ? 1 : 0;

                        if(!vStats[reg]) vStats[reg] = { totalChecks: 0, defects: 0, drivers: {} };
                        if(!vStats[reg].drivers[driver]) vStats[reg].drivers[driver] = { checks: 0, defects: 0 };
                        
                        vStats[reg].totalChecks++;
                        vStats[reg].defects += hasDefect;
                        vStats[reg].drivers[driver].checks++;
                        vStats[reg].drivers[driver].defects += hasDefect;
                    };
                    filteredPre.forEach(process); filteredPost.forEach(process);

                    const insights = [];
                    Object.entries(vStats).forEach(([reg, stat]) => {
                        if (Object.keys(stat.drivers).length > 1 && stat.defects > 0) {
                            const avgDefectRate = stat.defects / stat.totalChecks;
                            if (avgDefectRate >= 0.15) { 
                                Object.entries(stat.drivers).forEach(([drvName, drvStat]) => {
                                    if (drvStat.checks >= 3 && drvStat.defects === 0) {
                                        const vObj = findVehicleByAnyReference(reg);
                                        insights.push({
                                            driver: drvName, checks: drvStat.checks, 
                                            vehicle: vObj && vObj.Internreferens ? `${vObj.Internreferens} (${reg})` : reg,
                                            avgRate: Math.round(avgDefectRate * 100)
                                        });
                                    }
                                });
                            }
                        }
                    });
                    return insights;
                };
                const smartInsights = detectTickAndGo();

                const getDeptStats = () => {
                    return departments.map(dep => {
                        const depVehicles = vehicles.filter(v => v.Avdelning === dep && !hiddenVehicles.includes(v['Namn']));
                        const depChecks = [...reportChecks, ...reportPostChecks].filter(c => {
                            const v = findVehicleByAnyReference(String(c['Regnr Bil'] || ''));
                            return v && v.Avdelning === dep;
                        });
                        const unqChecked = new Set(depChecks.map(c => normalizeRegNr(c['Regnr Bil']))).size;
                        const depCompl = depVehicles.length > 0 ? Math.round((unqChecked / depVehicles.length) * 100) : 0;
                        
                        let depErrors = 0;
                        depChecks.forEach(c => { if(analyzeCheckStatus(c) === 'ERROR') depErrors++; });
                        const depHindex = Math.round(depCompl * (1 - (depErrors / Math.max(1, depChecks.length))));
                        
                        return { name: dep, compliance: depCompl, health: depHindex };
                    }).sort((a,b) => b.health - a.health);
                };
                const deptStats = reportDepartments.length === 0 ? getDeptStats() : [];

                const renderRadarChart = () => {
                    const radarData = topDefects.slice(0, 6);
                    if (radarData.length < 3) return null; 
                    
                    const maxVal = Math.max(...radarData.map(d => d.total), 1);
                    const cx = 150; const cy = 140; const r = 85;
                    const points = radarData.map((d, i) => {
                        const angle = (Math.PI / 2) - (i * 2 * Math.PI / radarData.length);
                        const valR = (d.total / maxVal) * r;
                        return {
                            x: cx + valR * Math.cos(angle),
                            y: cy - valR * Math.sin(angle),
                            labelX: cx + (r + 25) * Math.cos(angle),
                            labelY: cy - (r + 20) * Math.sin(angle),
                            name: d.name,
                            val: d.total
                        };
                    });
                    const polyPoints = points.map(p => `${p.x},${p.y}`).join(' ');
                    
                    return (
                        <div className="mb-6 flex justify-center">
                            <svg viewBox="0 0 300 280" className="w-full max-w-[320px] h-auto">
                                {[0.25, 0.5, 0.75, 1].map(level => {
                                    const bgPoints = radarData.map((_, i) => {
                                        const angle = (Math.PI / 2) - (i * 2 * Math.PI / radarData.length);
                                        return `${cx + (r * level) * Math.cos(angle)},${cy - (r * level) * Math.sin(angle)}`;
                                    }).join(' ');
                                    return <polygon key={level} points={bgPoints} fill="none" stroke="#e2e8f0" strokeWidth="1" />
                                })}
                                {radarData.map((_, i) => {
                                    const angle = (Math.PI / 2) - (i * 2 * Math.PI / radarData.length);
                                    return <line key={`l${i}`} x1={cx} y1={cy} x2={cx + r * Math.cos(angle)} y2={cy - r * Math.sin(angle)} stroke="#e2e8f0" strokeWidth="1" />
                                })}
                                <polygon points={polyPoints} fill="rgba(59, 130, 246, 0.3)" stroke="#3b82f6" strokeWidth="2" />
                                {points.map((p, i) => (
                                    <g key={`p${i}`}>
                                        <circle cx={p.x} cy={p.y} r="4" fill="#3b82f6" />
                                        <text x={p.labelX} y={p.labelY} fontSize="11" fill="#475569" fontWeight="bold" textAnchor="middle" alignmentBaseline="middle">
                                            {p.name.length > 15 ? p.name.substring(0,13)+'..' : p.name}
                                        </text>
                                        <text x={p.labelX} y={p.labelY + 12} fontSize="10" fill="#94a3b8" textAnchor="middle" alignmentBaseline="middle">
                                            {p.val} st
                                        </text>
                                    </g>
                                ))}
                            </svg>
                        </div>
                    );
                };

                return (
                    <div className="max-w-[1600px] mx-auto relative p-4 md:p-8 print:p-0">
                        {/* Header Rapporter */}
                        <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-6 no-print">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setCurrentView('overview')} className="p-2.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors text-slate-500 hover:text-blue-600">
                                    <Icon name="arrow-left" className="w-6 h-6" />
                                </button>
                                <div>
                                    <h1 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                                        <Icon name="bar-chart-3" className="text-blue-600 w-8 h-8" />
                                        Statistik & Rapporter
                                    </h1>
                                </div>
                            </div>
                            <div className="flex flex-wrap items-center gap-3 bg-white p-2 rounded-xl shadow-sm border border-slate-200 w-full lg:w-auto">
                                
                                <div className="relative">
                                    <button 
                                        onClick={() => setReportDepOpen(!reportDepOpen)} 
                                        className="flex items-center gap-2 px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-700 font-bold focus:outline-none cursor-pointer"
                                    >
                                        <Icon name="layers" className="w-5 h-5 text-slate-500" />
                                        {reportDepartments.length === 0 ? "Alla avdelningar" : `${reportDepartments.length} valda`}
                                    </button>
                                    {reportDepOpen && (
                                        <>
                                            <div className="fixed inset-0 z-10" onClick={() => setReportDepOpen(false)}></div>
                                            <div className="absolute top-full left-0 mt-1 w-64 bg-white border border-slate-200 shadow-xl rounded-xl z-20 p-2 max-h-96 overflow-y-auto">
                                                <label className="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-lg cursor-pointer">
                                                    <input 
                                                        type="checkbox" 
                                                        checked={reportDepartments.length === 0} 
                                                        onChange={() => setReportDepartments([])} 
                                                        className="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500" 
                                                    />
                                                    <span className="text-sm font-medium text-slate-700">Visa alla avdelningar</span>
                                                </label>
                                                <div className="h-px bg-slate-100 my-1"></div>
                                                {departments.map(d => (
                                                    <label key={d} className="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-lg cursor-pointer">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={reportDepartments.includes(d)} 
                                                            onChange={(e) => {
                                                                setReportDepartments(prev => 
                                                                    prev.includes(d) ? prev.filter(x => x !== d) : [...prev, d]
                                                                );
                                                            }} 
                                                            className="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500" 
                                                        />
                                                        <span className="text-sm text-slate-700 font-medium truncate">{d}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </>
                                    )}
                                </div>

                                <div className="h-6 w-px bg-slate-200 mx-1"></div>
                                <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg">
                                    <Icon name="calendar" className="w-5 h-5 text-slate-500" />
                                    <select value={reportPeriod} onChange={(e) => setReportPeriod(e.target.value)} className="bg-transparent border-none text-slate-700 font-medium focus:outline-none focus:ring-0 cursor-pointer">
